function create3DExerciseAnimation(container, exerciseName) {
    if (typeof THREE === 'undefined') {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#8892b0;">3D 애니메이션을 사용할 수 없습니다</div>';
        return null;
    }

    var animData = exerciseAnimations[exerciseName];
    if (!animData) return null;

    var W = 300, H = 350;
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f0f1a);
    var camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.domElement.style.borderRadius = '10px';
    container.appendChild(renderer.domElement);

    // Lighting (same quality as anatomy renderer)
    scene.add(new THREE.AmbientLight(0xCCBBAA, 0.4));
    var dl = new THREE.DirectionalLight(0xfff5e8, 0.9);
    dl.position.set(-2, 5, 3);
    dl.castShadow = true;
    dl.shadow.mapSize.width = 512;
    dl.shadow.mapSize.height = 512;
    scene.add(dl);
    var fl = new THREE.DirectionalLight(0xaaccee, 0.25);
    fl.position.set(3, 1, 2);
    scene.add(fl);
    scene.add(new THREE.HemisphereLight(0xC8B898, 0x5A4A3A, 0.3));
    var rl = new THREE.DirectionalLight(0x88aacc, 0.25);
    rl.position.set(0, 1, -3);
    scene.add(rl);

    // Materials (MeshStandardMaterial for organic look)
    var skinMat = new THREE.MeshStandardMaterial({ color: 0xBBA888, roughness: 0.7, metalness: 0, flatShading: false });
    var skinDark = new THREE.MeshStandardMaterial({ color: 0x9B8670, roughness: 0.75, metalness: 0, flatShading: false });
    var jointMat = new THREE.MeshStandardMaterial({ color: 0xBBA888, roughness: 0.72, metalness: 0, flatShading: false });
    var shortsMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.8, metalness: 0, flatShading: false });
    var shirtMat = new THREE.MeshStandardMaterial({ color: 0x1a3a5a, roughness: 0.8, metalness: 0, flatShading: false });

    // Mannequin group
    var mannequin = new THREE.Group();

    // Convert 2D joint coords (300x350 canvas) to 3D coordinates
    function to3D(joint) {
        return {
            x: (joint.x - 150) / 50,
            y: -(joint.y - 175) / 50,
            z: 0
        };
    }

    // Shared geometry caches for per-frame rebuild
    var _geoCache = [];
    function getCachedGeo(type, args) {
        // Not caching for simplicity; just create fresh each frame
        return null;
    }

    // Create organic body parts from joint positions
    function buildMannequin(joints) {
        // Clear previous
        while (mannequin.children.length > 0) {
            var child = mannequin.children[0];
            mannequin.remove(child);
            if (child.geometry) child.geometry.dispose();
        }

        var j3d = {};
        for (var key in joints) {
            j3d[key] = to3D(joints[key]);
        }

        // Helper: create organic limb between two 3D points with muscle bulge
        function addOrganicLimb(from, to, radiusBase, bulgeFactor, mat) {
            var fx = from.x, fy = from.y, fz = from.z;
            var tx = to.x, ty = to.y, tz = to.z;
            var dx = tx - fx, dy = ty - fy, dz = tz - fz;
            var len = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if (len < 0.01) return;

            var segs = 10;
            var radSegs = 10;
            var points = [];
            for (var i = 0; i <= segs; i++) {
                var t = i / segs;
                points.push(new THREE.Vector3(
                    fx + dx * t,
                    fy + dy * t,
                    fz + dz * t
                ));
            }

            var geo = createMuscularLimb(points, function(t) {
                // Smooth muscle bulge shape: tapered at ends, bulging in middle
                var endTaper = 1.0;
                if (t < 0.12) endTaper = 0.6 + t / 0.12 * 0.4;
                else if (t > 0.88) endTaper = 0.6 + (1.0 - t) / 0.12 * 0.4;
                var bulge = 1.0 + bulgeFactor * Math.sin(t * Math.PI);
                return radiusBase * bulge * endTaper;
            }, segs, radSegs);
            var mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mannequin.add(mesh);
        }

        // Helper: add smooth sphere at joint
        function addJoint(pos, radius, mat) {
            var geo = new THREE.SphereGeometry(radius, 12, 10);
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(pos.x, pos.y, pos.z);
            mesh.castShadow = true;
            mannequin.add(mesh);
        }

        // Head (elongated)
        var headGeo = new THREE.SphereGeometry(0.34, 16, 14);
        headGeo.scale(1, 1.12, 0.92);
        var headMesh = new THREE.Mesh(headGeo, skinMat);
        headMesh.position.set(j3d.head.x, j3d.head.y, j3d.head.z);
        headMesh.castShadow = true;
        mannequin.add(headMesh);

        // Jaw
        var jawGeo = new THREE.SphereGeometry(0.14, 12, 8);
        jawGeo.scale(1.05, 0.45, 0.80);
        var jawMesh = new THREE.Mesh(jawGeo, skinMat);
        jawMesh.position.set(j3d.head.x, j3d.head.y - 0.20, j3d.head.z + 0.04);
        mannequin.add(jawMesh);

        // Neck (organic limb)
        addOrganicLimb(j3d.neck, j3d.head, 0.10, 0.15, skinMat);

        // Torso (organic LatheGeometry-based)
        var torsoMidX = (j3d.lShoulder.x + j3d.rShoulder.x) / 2;
        var torsoTopY = (j3d.lShoulder.y + j3d.rShoulder.y) / 2;
        var torsoH = Math.abs(torsoTopY - j3d.hip.y);
        var torsoW = Math.abs(j3d.rShoulder.x - j3d.lShoulder.x) * 0.55;
        if (torsoH > 0.1) {
            // Build torso as organic shape between shoulders and hip
            var tDir = new THREE.Vector3(
                j3d.hip.x - torsoMidX,
                j3d.hip.y - torsoTopY,
                0
            );
            var tLen = tDir.length();
            tDir.normalize();

            // Torso profile: wide at shoulders, narrow at waist, wider at hips
            var tProfile = [
                {r: 0.01, y: 0.50},
                {r: torsoW * 0.3, y: 0.48},
                {r: torsoW + 0.06, y: 0.42},
                {r: torsoW + 0.10, y: 0.35},
                {r: torsoW + 0.08, y: 0.25},
                {r: torsoW * 0.85, y: 0.10},
                {r: torsoW * 0.75, y: 0.0},
                {r: torsoW * 0.78, y: -0.10},
                {r: torsoW * 0.85, y: -0.25},
                {r: torsoW * 0.80, y: -0.38},
                {r: torsoW * 0.50, y: -0.46},
                {r: 0.01, y: -0.50}
            ];
            var tGeo = createOrganicTorso(tLen, tProfile, 18);
            var tMesh = new THREE.Mesh(tGeo, shirtMat);
            tMesh.position.set(torsoMidX, (torsoTopY + j3d.hip.y) / 2, 0);
            // Orient torso along the spine direction
            var upV = new THREE.Vector3(0, 1, 0);
            var torsoQuat = new THREE.Quaternion().setFromUnitVectors(upV, new THREE.Vector3(-tDir.x, -tDir.y, -tDir.z));
            tMesh.quaternion.copy(torsoQuat);
            tMesh.castShadow = true;
            mannequin.add(tMesh);
        }

        // Deltoid caps at shoulders
        addJoint(j3d.lShoulder, 0.18, skinMat);
        addJoint(j3d.rShoulder, 0.18, skinMat);

        // Upper arms (muscular)
        addOrganicLimb(j3d.lShoulder, j3d.lElbow, 0.10, 0.35, skinMat);
        addOrganicLimb(j3d.rShoulder, j3d.rElbow, 0.10, 0.35, skinMat);

        // Elbows (smooth joint spheres)
        addJoint(j3d.lElbow, 0.09, jointMat);
        addJoint(j3d.rElbow, 0.09, jointMat);

        // Forearms (muscular, less bulge)
        addOrganicLimb(j3d.lElbow, j3d.lHand, 0.08, 0.25, skinMat);
        addOrganicLimb(j3d.rElbow, j3d.rHand, 0.08, 0.25, skinMat);

        // Hands
        addJoint(j3d.lHand, 0.07, skinMat);
        addJoint(j3d.rHand, 0.07, skinMat);

        // Hip bridge
        var lHip = j3d.lHip || j3d.hip;
        var rHip = j3d.rHip || j3d.hip;
        if (j3d.lHip && j3d.rHip) {
            addOrganicLimb(j3d.lHip, j3d.rHip, 0.12, 0.20, shortsMat);
        }
        addJoint(lHip, 0.12, shortsMat);
        addJoint(rHip, 0.12, shortsMat);

        // Upper legs (thighs - muscular)
        addOrganicLimb(lHip, j3d.lKnee, 0.13, 0.40, shortsMat);
        addOrganicLimb(rHip, j3d.rKnee, 0.13, 0.40, shortsMat);

        // Knees (smooth)
        addJoint(j3d.lKnee, 0.10, jointMat);
        addJoint(j3d.rKnee, 0.10, jointMat);

        // Lower legs (calves - with gastrocnemius bulge)
        addOrganicLimb(j3d.lKnee, j3d.lFoot, 0.09, 0.30, skinMat);
        addOrganicLimb(j3d.rKnee, j3d.rFoot, 0.09, 0.30, skinMat);

        // Feet (organic rounded)
        var footGeo = new THREE.SphereGeometry(0.10, 10, 8);
        footGeo.scale(0.9, 0.3, 1.3);
        var footL = new THREE.Mesh(footGeo, skinDark);
        footL.position.set(j3d.lFoot.x, j3d.lFoot.y - 0.03, j3d.lFoot.z + 0.06);
        mannequin.add(footL);
        var footR = new THREE.Mesh(footGeo.clone(), skinDark);
        footR.position.set(j3d.rFoot.x, j3d.rFoot.y - 0.03, j3d.rFoot.z + 0.06);
        mannequin.add(footR);
    }

    scene.add(mannequin);

    // Ground shadow plane
    var gGeo = new THREE.PlaneGeometry(10, 10);
    var gMat = new THREE.ShadowMaterial({ opacity: 0.3 });
    var gPlane = new THREE.Mesh(gGeo, gMat);
    gPlane.rotation.x = -Math.PI / 2;
    gPlane.position.y = -3.8;
    gPlane.receiveShadow = true;
    scene.add(gPlane);

    // Camera (slightly elevated, looking down)
    camera.position.set(0, 0.8, 7);
    camera.lookAt(0, -0.2, 0);

    // Animation loop
    var speed = animData.speed || 2;
    var startTime = performance.now();
    var animId;

    function animateLoop(timestamp) {
        var elapsed = (timestamp - startTime) / 1000;
        var t = (Math.sin(elapsed * speed) + 1) / 2;
        var pose = lerpPose(animData.start, animData.end, t);
        buildMannequin(pose);
        renderer.render(scene, camera);
        animId = requestAnimationFrame(animateLoop);
    }

    animId = requestAnimationFrame(animateLoop);
    _active3DRenderers.push(renderer);
    _active3DAnimFrames.push(animId);

    return {
        renderer: renderer,
        scene: scene,
        animId: animId,
        dispose: function() {
            cancelAnimationFrame(animId);
            scene.traverse(function(obj) {
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) obj.material.forEach(function(m) { m.dispose(); });
                    else obj.material.dispose();
                }
            });
            renderer.dispose();
            if (renderer.domElement && renderer.domElement.parentNode) {
                renderer.domElement.parentNode.removeChild(renderer.domElement);
            }
        }
    };
}

// Cleanup all 3D renderers
function cleanup3DRenderers() {
    _active3DAnimFrames.forEach(function(id) { cancelAnimationFrame(id); });
    _active3DAnimFrames = [];
    _active3DRenderers.forEach(function(r) {
        try { r.dispose(); } catch(e) {}
        if (r.domElement && r.domElement.parentNode) {
            r.domElement.parentNode.removeChild(r.domElement);
        }
    });
    _active3DRenderers = [];
}

// ==================== FRONT ANATOMY (Canvas) ====================
function drawAnatomyFront(canvas, primary, secondary) {
    if (!canvas) return;
    var W = canvas.width, H = canvas.height;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    // Scale factors (designed for 280x480)
    var sx = W / 280, sy = H / 480;
    ctx.save();
    ctx.scale(sx, sy);

    // Helper: radial gradient for a muscle
    function muscleGrad(cx, cy, r, highlight, shadow) {
        var g = ctx.createRadialGradient(cx - r*0.25, cy - r*0.25, r*0.1, cx, cy, r);
        g.addColorStop(0, highlight || '#D4C4A8');
        g.addColorStop(0.6, shadow || '#BBA888');
        g.addColorStop(1, '#8B7355');
        return g;
    }

    // ===== LAYER 1: Drop shadow =====
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 18;
    ctx.shadowOffsetX = 5;
    ctx.shadowOffsetY = 7;
    _drawFrontBodyOutline(ctx);
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
    ctx.restore();

    // ===== LAYER 1b: Base body silhouette with radial gradient =====
    var baseGrad = ctx.createRadialGradient(130, 200, 30, 140, 240, 280);
    baseGrad.addColorStop(0, '#C8B498');
    baseGrad.addColorStop(0.5, '#BBA888');
    baseGrad.addColorStop(1, '#8B7355');
    _drawFrontBodyOutline(ctx);
    ctx.fillStyle = baseGrad;
    ctx.fill();

    // ===== LAYER 2: Individual muscle groups with 3D volume =====

    // -- HEAD --
    ctx.beginPath();
    ctx.ellipse(140, 40, 30, 33, 0, 0, Math.PI * 2);
    var headGrad = ctx.createRadialGradient(133, 32, 5, 140, 40, 33);
    headGrad.addColorStop(0, '#D4C4A8');
    headGrad.addColorStop(0.7, '#BBA888');
    headGrad.addColorStop(1, '#9B8670');
    ctx.fillStyle = headGrad;
    ctx.fill();

    // Brow ridge shadow
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.ellipse(140, 30, 22, 5, 0, 0, Math.PI);
    ctx.fillStyle = '#8B7355';
    ctx.fill();
    ctx.restore();

    // Face features
    ctx.fillStyle = 'rgba(60,40,30,0.5)';
    ctx.beginPath(); ctx.ellipse(129, 36, 3.5, 2.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(151, 36, 3.5, 2.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.ellipse(128, 35, 1.2, 1, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(150, 35, 1.2, 1, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(60,40,30,0.4)';
    ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.moveTo(124, 30); ctx.bezierCurveTo(127, 28, 132, 28, 134, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(146, 30); ctx.bezierCurveTo(149, 28, 154, 28, 156, 30); ctx.stroke();
    ctx.strokeStyle = 'rgba(80,60,40,0.4)';
    ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.moveTo(140, 37); ctx.lineTo(138, 44); ctx.bezierCurveTo(136, 46, 144, 46, 142, 44); ctx.stroke();
    ctx.strokeStyle = 'rgba(120,60,50,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(133, 51); ctx.bezierCurveTo(136, 53, 144, 53, 147, 51); ctx.stroke();
    ctx.strokeStyle = 'rgba(80,60,40,0.15)';
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.arc(140, 56, 8, 0.3, Math.PI - 0.3); ctx.stroke();

    // -- NECK (sternocleidomastoid) --
    (function() {
        ctx.beginPath();
        ctx.moveTo(125, 70); ctx.lineTo(155, 70); ctx.lineTo(157, 92); ctx.lineTo(123, 92); ctx.closePath();
        var nkG = ctx.createRadialGradient(134, 78, 3, 140, 82, 20);
        nkG.addColorStop(0, '#C8B498');
        nkG.addColorStop(1, '#9B8670');
        ctx.fillStyle = nkG;
        ctx.fill();
        ctx.strokeStyle = 'rgba(80,60,40,0.25)';
        ctx.lineWidth = 0.7;
        ctx.beginPath(); ctx.moveTo(131, 71); ctx.bezierCurveTo(129, 78, 128, 85, 127, 90); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(149, 71); ctx.bezierCurveTo(151, 78, 152, 85, 153, 90); ctx.stroke();
    })();

    // -- CLAVICLES --
    ctx.strokeStyle = 'rgba(80,60,40,0.35)';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(140, 94); ctx.bezierCurveTo(120, 90, 105, 92, 95, 96); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(140, 94); ctx.bezierCurveTo(160, 90, 175, 92, 185, 96); ctx.stroke();
    ctx.strokeStyle = 'rgba(232,220,200,0.2)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(140, 93); ctx.bezierCurveTo(120, 89, 108, 91, 98, 95); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(140, 93); ctx.bezierCurveTo(160, 89, 172, 91, 182, 95); ctx.stroke();

    // -- DELTOIDS --
    _drawMuscle3D(ctx, primary, secondary, 'shoulders', function() {
        ctx.beginPath();
        ctx.moveTo(97, 94);
        ctx.bezierCurveTo(78, 88, 58, 96, 55, 112);
        ctx.bezierCurveTo(53, 126, 57, 137, 66, 142);
        ctx.lineTo(94, 134);
        ctx.bezierCurveTo(97, 120, 97, 108, 97, 94);
        ctx.closePath();
    }, 72, 108, 30, '#C4AA8C', '#8B7355', function() {
        ctx.beginPath();
        ctx.moveTo(183, 94);
        ctx.bezierCurveTo(202, 88, 222, 96, 225, 112);
        ctx.bezierCurveTo(227, 126, 223, 137, 214, 142);
        ctx.lineTo(186, 134);
        ctx.bezierCurveTo(183, 120, 183, 108, 183, 94);
        ctx.closePath();
    }, 208, 108, 30);

    // Deltoid striations
    ctx.strokeStyle = 'rgba(90,74,58,0.3)';
    ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(68, 98); ctx.bezierCurveTo(63, 110, 62, 124, 66, 136); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(77, 95); ctx.bezierCurveTo(72, 108, 71, 120, 74, 132); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(212, 98); ctx.bezierCurveTo(217, 110, 218, 124, 214, 136); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(203, 95); ctx.bezierCurveTo(208, 108, 209, 120, 206, 132); ctx.stroke();

    // -- PECTORALS --
    _drawMuscle3D(ctx, primary, secondary, 'chest', function() {
        ctx.beginPath();
        ctx.moveTo(97, 98);
        ctx.bezierCurveTo(100, 104, 112, 114, 137, 120);
        ctx.lineTo(137, 155);
        ctx.bezierCurveTo(120, 163, 100, 154, 94, 140);
        ctx.bezierCurveTo(90, 128, 93, 112, 97, 98);
        ctx.closePath();
    }, 112, 120, 35, '#C4AA8C', '#9B8670', function() {
        ctx.beginPath();
        ctx.moveTo(183, 98);
        ctx.bezierCurveTo(180, 104, 168, 114, 143, 120);
        ctx.lineTo(143, 155);
        ctx.bezierCurveTo(160, 163, 180, 154, 186, 140);
        ctx.bezierCurveTo(190, 128, 187, 112, 183, 98);
        ctx.closePath();
    }, 168, 120, 35);

    // Pec lower curve
    ctx.strokeStyle = 'rgba(90,74,58,0.3)';
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(98, 130); ctx.bezierCurveTo(110, 144, 122, 150, 137, 152); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(182, 130); ctx.bezierCurveTo(170, 144, 158, 150, 143, 152); ctx.stroke();

    // Nipples
    ctx.beginPath(); ctx.arc(114, 134, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(160,110,90,0.4)'; ctx.fill();
    ctx.beginPath(); ctx.arc(166, 134, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(160,110,90,0.4)'; ctx.fill();

    // -- SERRATUS ANTERIOR --
    (function() {
        ctx.strokeStyle = 'rgba(90,74,58,0.25)';
        ctx.lineWidth = 0.6;
        for (var si = 0; si < 4; si++) {
            var sy = 142 + si * 10;
            ctx.beginPath(); ctx.moveTo(94, sy); ctx.bezierCurveTo(88, sy + 2, 86, sy + 6, 88, sy + 8); ctx.stroke();
        }
        for (var si2 = 0; si2 < 4; si2++) {
            var sy2 = 142 + si2 * 10;
            ctx.beginPath(); ctx.moveTo(186, sy2); ctx.bezierCurveTo(192, sy2 + 2, 194, sy2 + 6, 192, sy2 + 8); ctx.stroke();
        }
    })();

    // -- BICEPS --
    _drawMuscle3D(ctx, primary, secondary, 'biceps', function() {
        ctx.beginPath();
        ctx.moveTo(62, 142);
        ctx.bezierCurveTo(54, 154, 48, 180, 46, 200);
        ctx.bezierCurveTo(43, 210, 48, 216, 56, 216);
        ctx.lineTo(68, 216);
        ctx.bezierCurveTo(73, 200, 74, 172, 68, 150);
        ctx.closePath();
    }, 56, 174, 24, '#C4AA8C', '#9B8670', function() {
        ctx.beginPath();
        ctx.moveTo(218, 142);
        ctx.bezierCurveTo(226, 154, 232, 180, 234, 200);
        ctx.bezierCurveTo(237, 210, 232, 216, 224, 216);
        ctx.lineTo(212, 216);
        ctx.bezierCurveTo(207, 200, 206, 172, 212, 150);
        ctx.closePath();
    }, 224, 174, 24);

    // Bicep peak line
    ctx.strokeStyle = 'rgba(90,74,58,0.25)';
    ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(58, 158); ctx.bezierCurveTo(53, 176, 50, 194, 52, 208); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(222, 158); ctx.bezierCurveTo(227, 176, 230, 194, 228, 208); ctx.stroke();

    // -- FOREARMS --
    (function() {
        ctx.beginPath();
        ctx.moveTo(43, 256); ctx.bezierCurveTo(38, 280, 35, 304, 38, 320);
        ctx.lineTo(50, 324); ctx.bezierCurveTo(55, 308, 57, 284, 54, 260);
        ctx.closePath();
        ctx.fillStyle = muscleGrad(46, 286, 28, '#BBA888', '#8B7355');
        ctx.fill();
        ctx.strokeStyle = 'rgba(90,74,58,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(47, 262); ctx.bezierCurveTo(43, 284, 41, 304, 43, 316); ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(237, 256); ctx.bezierCurveTo(242, 280, 245, 304, 242, 320);
        ctx.lineTo(230, 324); ctx.bezierCurveTo(225, 308, 223, 284, 226, 260);
        ctx.closePath();
        ctx.fillStyle = muscleGrad(234, 286, 28, '#BBA888', '#8B7355');
        ctx.fill();
        ctx.strokeStyle = 'rgba(90,74,58,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(233, 262); ctx.bezierCurveTo(237, 284, 239, 304, 237, 316); ctx.stroke();

// Enhanced muscle drawing helper with per-muscle radial gradient
function _drawMuscle3D(ctx, primary, secondary, muscleId, pathFn1, cx1, cy1, r1, hl, sh, pathFn2, cx2, cy2, r2) {
    var overlay = _muscleColor(muscleId, primary, secondary);
    var highlight = hl || '#C4AA8C';
    var shadow = sh || '#9B8670';

    var drawOne = function(pathFn, cx, cy, r) {
        pathFn();
        var g = ctx.createRadialGradient(cx - r*0.2, cy - r*0.2, r*0.08, cx, cy, r);
        g.addColorStop(0, highlight);
        g.addColorStop(0.5, shadow);
        g.addColorStop(1, '#6B5845');
        ctx.fillStyle = g;
        ctx.fill();

        if (overlay) {
            pathFn();
            ctx.fillStyle = overlay;
            ctx.fill();
        }

        pathFn();
        ctx.strokeStyle = 'rgba(60,48,36,0.3)';
        ctx.lineWidth = 0.7;
        ctx.stroke();

        ctx.save();
        pathFn();
        ctx.clip();
        pathFn();
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
    };

    drawOne(pathFn1, cx1, cy1, r1);
    if (pathFn2) drawOne(pathFn2, cx2 || cx1, cy2 || cy1, r2 || r1);
}

function findDemoKey(exerciseName) {
    if (!exerciseName) return null;
    const raw = exerciseName.trim();
    // Strip parenthetical descriptions so "월 싯 (벽 스쿼트 자세 유지)" matches the canonical "월 싯".
    const canonical = raw.replace(/\s*\([^)]*\)\s*/g, ' ').replace(/\s+/g, ' ').trim();
    if (exerciseDemos[raw]) return raw;
    if (exerciseDemos[canonical]) return canonical;
    if (Object.prototype.hasOwnProperty.call(exerciseAliases, canonical)) {
        const aliased = exerciseAliases[canonical];
        return (aliased && exerciseDemos[aliased]) ? aliased : null;
    }
    return null;
}

// Exercise Animation System (2D neon human silhouette)
// ============================================================
var _demoAnimationFrameId = null;
var _active3DInstances = [];

// 2D neon human silhouette animation — uses existing joint keyframes.
// Replaces the old 3D wooden-mannequin renderer with a clean human outline.
function create2DExerciseAnimation(container, exerciseName) {
    var animData = exerciseAnimations[exerciseName];
    if (!animData) return null;

    var W = 300, H = 350;
    var canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    canvas.style.borderRadius = '10px';
    canvas.style.background = '#0a0a18';
    canvas.style.display = 'block';
    canvas.style.maxWidth = '100%';
    container.appendChild(canvas);
    var ctx = canvas.getContext('2d');

    var startTime = performance.now();
    var duration = 1000 / (animData.speed || 2);
    var animId = null;
    var stopped = false;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function lerpJoint(p1, p2, t) { return { x: lerp(p1.x, p2.x, t), y: lerp(p1.y, p2.y, t) }; }
    function lerpPose(a, b, t) {
        var out = {};
        for (var k in a) {
            if (a[k] && b[k] && typeof a[k].x === 'number') out[k] = lerpJoint(a[k], b[k], t);
        }
        return out;
    }

    function stroke(ctx, p1, p2, w) {
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineWidth = w;
        ctx.stroke();
    }

    function drawTaperedLimb(p1, p2, w1, w2) {
        var dx = p2.x - p1.x, dy = p2.y - p1.y;
        var len = Math.hypot(dx, dy) || 1;
        var nx = -dy / len, ny = dx / len;
        ctx.beginPath();
        ctx.moveTo(p1.x + nx * w1, p1.y + ny * w1);
        ctx.lineTo(p2.x + nx * w2, p2.y + ny * w2);
        ctx.lineTo(p2.x - nx * w2, p2.y - ny * w2);
        ctx.lineTo(p1.x - nx * w1, p1.y - ny * w1);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    function drawFigure(pose) {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#0a0a18';
        ctx.fillRect(0, 0, W, H);

        var ls = pose.lShoulder, rs = pose.rShoulder, lh = pose.lHip, rh = pose.rHip;
        var head = pose.head, neck = pose.neck;
        if (!ls || !rs || !lh || !rh || !head) return;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#eaf7ff';
        ctx.fillStyle = 'rgba(150, 215, 255, 0.22)';
        ctx.shadowColor = 'rgba(130, 210, 255, 0.85)';
        ctx.shadowBlur = 14;
        ctx.lineWidth = 2.5;

        // --- Torso: hourglass shape with chest/waist curve ---
        var shoulderMid = { x: (ls.x + rs.x) / 2, y: (ls.y + rs.y) / 2 };
        var hipMid = { x: (lh.x + rh.x) / 2, y: (lh.y + rh.y) / 2 };
        // Waist sits ~55% down from shoulders to hips, slightly narrowed
        var shoulderSpan = Math.hypot(rs.x - ls.x, rs.y - ls.y);
        var hipSpan = Math.hypot(rh.x - lh.x, rh.y - lh.y);
        var waistInset = 0.86;  // how much the waist narrows
        var torsoDir = { x: hipMid.x - shoulderMid.x, y: hipMid.y - shoulderMid.y };
        var torsoLen = Math.hypot(torsoDir.x, torsoDir.y) || 1;
        var tnx = -torsoDir.y / torsoLen, tny = torsoDir.x / torsoLen;
        var waistMid = { x: lerp(shoulderMid.x, hipMid.x, 0.55), y: lerp(shoulderMid.y, hipMid.y, 0.55) };
        var waistHalf = (Math.max(shoulderSpan, hipSpan) / 2) * waistInset;
        var waistL = { x: waistMid.x + tnx * waistHalf, y: waistMid.y + tny * waistHalf };
        var waistR = { x: waistMid.x - tnx * waistHalf, y: waistMid.y - tny * waistHalf };

        ctx.beginPath();
        ctx.moveTo(ls.x, ls.y);
        ctx.lineTo(rs.x, rs.y);
        // Right side: shoulder → waistR → hip (smooth curve)
        ctx.quadraticCurveTo(waistR.x, waistR.y, rh.x, rh.y);
        ctx.lineTo(lh.x, lh.y);
        // Left side: hip → waistL → shoulder
        ctx.quadraticCurveTo(waistL.x, waistL.y, ls.x, ls.y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // --- Arms (shoulder → elbow → hand, tapered) ---
        if (pose.lElbow && pose.lHand) {
            drawTaperedLimb(ls, pose.lElbow, 7, 5.5);
            drawTaperedLimb(pose.lElbow, pose.lHand, 5, 3.8);
        }
        if (pose.rElbow && pose.rHand) {
            drawTaperedLimb(rs, pose.rElbow, 7, 5.5);
            drawTaperedLimb(pose.rElbow, pose.rHand, 5, 3.8);
        }

        // --- Legs (hip → knee → foot, tapered) ---
        if (pose.lKnee && pose.lFoot) {
            drawTaperedLimb(lh, pose.lKnee, 10, 7.5);
            drawTaperedLimb(pose.lKnee, pose.lFoot, 7, 5);
        }
        if (pose.rKnee && pose.rFoot) {
            drawTaperedLimb(rh, pose.rKnee, 10, 7.5);
            drawTaperedLimb(pose.rKnee, pose.rFoot, 7, 5);
        }

        // --- Hands (small circles) ---
        if (pose.lHand) {
            ctx.beginPath();
            ctx.arc(pose.lHand.x, pose.lHand.y, 4.2, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
        }
        if (pose.rHand) {
            ctx.beginPath();
            ctx.arc(pose.rHand.x, pose.rHand.y, 4.2, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
        }

        // --- Feet (small ovals aligned to leg direction) ---
        function drawFoot(knee, foot) {
            var dx = foot.x - knee.x, dy = foot.y - knee.y;
            var ang = Math.atan2(dy, dx) + Math.PI / 2;
            ctx.save();
            ctx.translate(foot.x, foot.y);
            ctx.rotate(ang);
            ctx.beginPath();
            ctx.ellipse(0, 0, 8, 4.2, 0, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            ctx.restore();
        }
        if (pose.lKnee && pose.lFoot) drawFoot(pose.lKnee, pose.lFoot);
        if (pose.rKnee && pose.rFoot) drawFoot(pose.rKnee, pose.rFoot);

        // --- Neck (trapezoid) + Head (oval) ---
        var neckTop = { x: head.x, y: head.y + 11 };
        var neckHalfTop = 5.5, neckHalfBot = 7;
        ctx.beginPath();
        ctx.moveTo(neckTop.x - neckHalfTop, neckTop.y);
        ctx.lineTo(neckTop.x + neckHalfTop, neckTop.y);
        ctx.lineTo(shoulderMid.x + neckHalfBot, shoulderMid.y);
        ctx.lineTo(shoulderMid.x - neckHalfBot, shoulderMid.y);
        ctx.closePath();
        ctx.fill(); ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(head.x, head.y, 12, 14.5, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
    }

    function step(now) {
        if (stopped) return;
        var elapsed = now - startTime;
        var cycle = (elapsed % (duration * 2)) / duration;
        var t = cycle < 1 ? cycle : 2 - cycle; // ping-pong
        drawFigure(lerpPose(animData.start, animData.end, t));
        animId = requestAnimationFrame(step);
    }
    animId = requestAnimationFrame(step);

    return {
        dispose: function() {
            stopped = true;
            if (animId) cancelAnimationFrame(animId);
            try { container.removeChild(canvas); } catch(e) {}
        }
    };
}

function lerpJoint(a, b, t) {
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
}

function lerpPose(startPose, endPose, t) {
    var result = {};
    for (var key in startPose) {
        result[key] = lerpJoint(startPose[key], endPose[key], t);
    }
    return result;
}

function drawAnimatedBody(ctx, joints, w, h) {
    ctx.clearRect(0, 0, w, h);

    // Background
    ctx.fillStyle = 'rgba(15,15,26,0.95)';
    ctx.fillRect(0, 0, w, h);

    var skinBase = '#D4A574';
    var skinShadow = '#A67B5B';
    var skinHighlight = '#E8C4A0';
    var skinDeep = '#8B6B4A';
    var shortColor = '#2a2a4a';
    var shirtColor = '#1a3a5a';

    // Shadow beneath figure
    ctx.save();
    ctx.globalAlpha = 0.3;
    var shadowY = Math.max(joints.lFoot.y, joints.rFoot.y) + 5;
    var shadowCx = (joints.lFoot.x + joints.rFoot.x) / 2;
    ctx.beginPath();
    ctx.ellipse(shadowCx, shadowY, 50, 8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.restore();

    // Helper: draw limb with muscle shape and cross-width gradient
    function drawMuscularLimb(from, to, widthBase, widthMid, color1, color2) {
        var dx = to.x - from.x;
        var dy = to.y - from.y;
        var len = Math.sqrt(dx*dx + dy*dy);
        if (len < 1) return;
        var nx = -dy / len;
        var ny = dx / len;

        var mid = {x: (from.x + to.x) / 2, y: (from.y + to.y) / 2};
        var hw1 = widthBase / 2;
        var hw2 = widthMid / 2;
        var hw3 = widthBase / 2 * 0.85;

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(from.x + nx * hw1, from.y + ny * hw1);
        ctx.quadraticCurveTo(mid.x + nx * hw2, mid.y + ny * hw2, to.x + nx * hw3, to.y + ny * hw3);
        ctx.lineTo(to.x - nx * hw3, to.y - ny * hw3);
        ctx.quadraticCurveTo(mid.x - nx * (hw2 * 0.7), mid.y - ny * (hw2 * 0.7), from.x - nx * hw1, from.y - ny * hw1);
        ctx.closePath();

        var gx1 = mid.x + nx * hw2;
        var gy1 = mid.y + ny * hw2;
        var gx2 = mid.x - nx * hw2;
        var gy2 = mid.y - ny * hw2;
        var grad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
        grad.addColorStop(0, color1);
        grad.addColorStop(0.4, color2);
        grad.addColorStop(1, color1);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
        ctx.restore();
    }

    // Helper: gradient joint circle
    function drawJointCircle(pos, radius, color1, color2) {
        var jg = ctx.createRadialGradient(pos.x - radius*0.3, pos.y - radius*0.3, radius*0.1, pos.x, pos.y, radius);
        jg.addColorStop(0, color1 || skinHighlight);
        jg.addColorStop(1, color2 || skinShadow);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = jg;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.1)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // Torso (shaped with chest/waist taper)
    ctx.save();
    var lS = joints.lShoulder, rS = joints.rShoulder, lH = joints.lHip, rH = joints.rHip;
    var chestW = 6;
    var waistNarrow = 4;
    var midTorsoY = (lS.y + lH.y) / 2;
    var midTorsoX = (lS.x + rS.x) / 2;

    ctx.beginPath();
    ctx.moveTo(lS.x - chestW, lS.y);
    ctx.lineTo(rS.x + chestW, rS.y);
    ctx.bezierCurveTo(rS.x + chestW + 2, midTorsoY - 10, rH.x + waistNarrow, midTorsoY + 10, rH.x, rH.y);
    ctx.lineTo(lH.x, lH.y);
    ctx.bezierCurveTo(lH.x - waistNarrow, midTorsoY + 10, lS.x - chestW - 2, midTorsoY - 10, lS.x - chestW, lS.y);
    ctx.closePath();

    var torsoGrad = ctx.createLinearGradient(lS.x - chestW, lS.y, rS.x + chestW, rH.y);
    torsoGrad.addColorStop(0, shirtColor);
    torsoGrad.addColorStop(0.3, '#1e4a6e');
    torsoGrad.addColorStop(0.7, '#1e4a6e');
    torsoGrad.addColorStop(1, shirtColor);
    ctx.fillStyle = torsoGrad;
    ctx.fill();

    ctx.strokeStyle = 'rgba(33,150,243,0.1)';
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(midTorsoX, lS.y + 4); ctx.lineTo(midTorsoX, lH.y - 4); ctx.stroke();
    ctx.strokeStyle = 'rgba(33,150,243,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lS.x - chestW, lS.y);
    ctx.lineTo(rS.x + chestW, rS.y);
    ctx.bezierCurveTo(rS.x + chestW + 2, midTorsoY - 10, rH.x + waistNarrow, midTorsoY + 10, rH.x, rH.y);
    ctx.lineTo(lH.x, lH.y);
    ctx.bezierCurveTo(lH.x - waistNarrow, midTorsoY + 10, lS.x - chestW - 2, midTorsoY - 10, lS.x - chestW, lS.y);
    ctx.stroke();
    ctx.restore();

    // Upper legs (shorts)
    drawMuscularLimb(joints.lHip, joints.lKnee, 16, 20, shortColor, '#3a3a5a');
    drawMuscularLimb(joints.rHip, joints.rKnee, 16, 20, shortColor, '#3a3a5a');

    // Lower legs (calf bulge)
    drawMuscularLimb(joints.lKnee, joints.lFoot, 13, 17, skinBase, skinShadow);
    drawMuscularLimb(joints.rKnee, joints.rFoot, 13, 17, skinBase, skinShadow);

    // Feet
    drawJointCircle(joints.lFoot, 7, skinBase, skinDeep);
    drawJointCircle(joints.rFoot, 7, skinBase, skinDeep);

    // Upper arms (bicep bulge)
    drawMuscularLimb(joints.lShoulder, joints.lElbow, 11, 15, skinBase, skinHighlight);
    drawMuscularLimb(joints.rShoulder, joints.rElbow, 11, 15, skinBase, skinHighlight);

    // Forearms
    drawMuscularLimb(joints.lElbow, joints.lHand, 10, 12, skinBase, skinShadow);
    drawMuscularLimb(joints.rElbow, joints.rHand, 10, 12, skinBase, skinShadow);

    // Hands
    drawJointCircle(joints.lHand, 5.5, skinHighlight, skinBase);
    drawJointCircle(joints.rHand, 5.5, skinHighlight, skinBase);

    // Knee joints
    drawJointCircle(joints.lKnee, 5.5, skinBase, skinShadow);
    drawJointCircle(joints.rKnee, 5.5, skinBase, skinShadow);

    // Elbow joints
    drawJointCircle(joints.lElbow, 4.5, skinBase, skinShadow);
    drawJointCircle(joints.rElbow, 4.5, skinBase, skinShadow);

    // Shoulder joints
    drawJointCircle(joints.lShoulder, 7, skinHighlight, skinBase);
    drawJointCircle(joints.rShoulder, 7, skinHighlight, skinBase);

    // Hip joints
    drawJointCircle(joints.lHip, 4, shortColor, '#3a3a5a');
    drawJointCircle(joints.rHip, 4, shortColor, '#3a3a5a');

    // Neck
    drawMuscularLimb(joints.neck, joints.head, 10, 11, skinBase, skinHighlight);

    // Head
    ctx.save();
    var headRadius = 17;
    var headGrad = ctx.createRadialGradient(joints.head.x - 4, joints.head.y - 4, 2, joints.head.x, joints.head.y, headRadius);
    headGrad.addColorStop(0, skinHighlight);
    headGrad.addColorStop(0.5, skinBase);
    headGrad.addColorStop(1, skinShadow);
    ctx.beginPath();
    ctx.arc(joints.head.x, joints.head.y, headRadius, 0, Math.PI * 2);
    ctx.fillStyle = headGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Face
    ctx.fillStyle = 'rgba(60,40,30,0.35)';
    ctx.beginPath(); ctx.ellipse(joints.head.x - 4, joints.head.y - 2, 2, 1.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(joints.head.x + 4, joints.head.y - 2, 2, 1.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(120,60,50,0.3)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.arc(joints.head.x, joints.head.y + 5, 3, 0.2, Math.PI - 0.2);
    ctx.stroke();
    ctx.restore();
}


function createExerciseAnimation(canvas, exerciseName) {
    var animData = exerciseAnimations[exerciseName];
    if (!animData) return null;

    var ctx = canvas.getContext('2d');
    var w = canvas.width;
    var h = canvas.height;
    var speed = animData.speed || 2;
    var startTime = performance.now();

    function animate(timestamp) {
        var elapsed = (timestamp - startTime) / 1000;
        var t = (Math.sin(elapsed * speed) + 1) / 2;
        var pose = lerpPose(animData.start, animData.end, t);
        drawAnimatedBody(ctx, pose, w, h);
        _demoAnimationFrameId = requestAnimationFrame(animate);
    }

    _demoAnimationFrameId = requestAnimationFrame(animate);
    return _demoAnimationFrameId;
}

    const legendEl = document.getElementById('demoMuscleLegend');
    const stepsEl = document.getElementById('demoSteps');
    const contentGrid = document.getElementById('demoContentGrid');
    const videoCol = document.getElementById('demoVideoCol');
    const anatomyCol = document.getElementById('demoAnatomyCol');

    // Cancel any existing animation and clean up 3D
    if (_demoAnimationFrameId) {
        cancelAnimationFrame(_demoAnimationFrameId);
        _demoAnimationFrameId = null;
    }
    _active3DInstances.forEach(function(inst) { if (inst && inst.dispose) inst.dispose(); });
    _active3DInstances = [];
    cleanup3DRenderers();

    titleEl.textContent = exerciseName;

    // Canonical name (parentheticals stripped) for media lookup — keeps variant-specific
    // stills/animations working even when the demo (instructions) maps to a different canonical exercise.
    const _rawName = exerciseName.trim();
    const canonicalName = _rawName.replace(/\s*\([^)]*\)\s*/g, ' ').replace(/\s+/g, ' ').trim();
    const demoKey = findDemoKey(exerciseName);
    if (demoKey && exerciseDemos[demoKey]) {
        const demo = exerciseDemos[demoKey];

        // Show the grid layout
        contentGrid.style.display = '';
        videoCol.style.display = '';
        anatomyCol.style.display = '';

        // Muscle tags
        tagsEl.innerHTML = demo.muscles.map(m => '<span class="demo-muscle-tag">' + m + '</span>').join('');

        // Render helper for a still-image pair that alternates every 700ms.
        function renderStillPair(pair) {
            var pairId = 'demoStill_' + Math.random().toString(36).slice(2, 8);
            videoAreaEl.innerHTML =
                '<div class="demo-video-area" style="position:relative;background:#0f0f1a;border-radius:12px;overflow:hidden;">' +
                '<img id="' + pairId + '" src="' + pair[0] + '" alt="' + exerciseName + ' start" style="width:100%;display:block;border-radius:12px;" onerror="this.parentElement.innerHTML=\'<div style=text-align:center;padding:20px;color:var(--text-muted)>사진을 불러올 수 없습니다.</div>\'">' +
                '</div>';
            setTimeout(function() {
                var imgEl = document.getElementById(pairId);
                if (!imgEl) return;
                var frame = 0;
                var timer = setInterval(function() {
                    if (!document.body.contains(imgEl)) { clearInterval(timer); return; }
                    frame = 1 - frame;
                    imgEl.src = pair[frame];
                }, 700);
                _active3DInstances.push({ dispose: function() { clearInterval(timer); } });
            }, 50);
        }

        // Render helper for the 2D silhouette animation.
        function renderSilhouette(animName) {
            videoAreaEl.innerHTML = '<div class="demo-video-area" style="background:#0f0f1a;padding:10px;display:flex;justify-content:center;" id="demoAnim3DContainer"></div>';
            setTimeout(function() {
                var animContainer = document.getElementById('demoAnim3DContainer');
                if (animContainer) {
                    var inst = create2DExerciseAnimation(animContainer, animName);
                    if (inst) _active3DInstances.push(inst);
                }
            }, 50);
        }

        // Priority: canonical-specific beats aliased (demoKey) beats generic gif.
        // This keeps "플랭크 투 푸쉬업" from borrowing "플랭크" stills/gif when the canonical animation exists.
        var hasVideo = true;
        if (exerciseStills[canonicalName]) {
            renderStillPair(exerciseStills[canonicalName]);
        } else if (exerciseAnimations[canonicalName]) {
            renderSilhouette(canonicalName);
        } else if (demo.gifUrl) {
            videoAreaEl.innerHTML = '<div class="demo-video-area"><img src="' + demo.gifUrl + '" alt="' + exerciseName + ' demo" style="width:100%;border-radius:12px;" onerror="this.parentElement.innerHTML=\'<div style=text-align:center;padding:20px;color:var(--text-muted)>영상을 불러올 수 없습니다.</div>\'"></div>';
        } else if (exerciseStills[demoKey]) {
            renderStillPair(exerciseStills[demoKey]);
        } else if (exerciseAnimations[demoKey]) {
            renderSilhouette(demoKey);
        } else {
            hasVideo = false;
            // No video: show pose silhouettes as fallback in video column
            videoAreaEl.innerHTML =
                '<div style="background:var(--bg-card);border-radius:12px;padding:16px;text-align:center;">' +
                '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">동작 흐름</div>' +
                '<div style="display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;">' +
                '<div style="text-align:center;"><div style="font-size:10px;color:var(--text-muted);margin-bottom:2px;">시작</div><canvas id="demoPose1CanvasInner" width="120" height="200"></canvas></div>' +
                '<div style="color:var(--text-muted);font-size:20px;">&#8594;</div>' +
                '<div style="text-align:center;"><div style="font-size:10px;color:var(--text-muted);margin-bottom:2px;">동작</div><canvas id="demoPose2CanvasInner" width="120" height="200"></canvas></div>' +
                '</div></div>';
        }

        // If no video content at all, make anatomy column full width
        if (!hasVideo && !demo.startPose) {
            contentGrid.style.gridTemplateColumns = '1fr';
            videoCol.style.display = 'none';
        } else {
            contentGrid.style.gridTemplateColumns = '';
        }

        // Anatomy image
        figuresEl.innerHTML = '<div id="demoAnatomyImageContainer" style="width:100%;max-width:280px;background:#1a1a2e;border-radius:8px;overflow:hidden;"></div>';

        // Render anatomy image, pose silhouettes, and muscle legend after DOM update
        setTimeout(function() {
            var anatomyContainer = document.getElementById('demoAnatomyImageContainer');
            var pose1Canvas = document.getElementById('demoPose1CanvasInner');
            var pose2Canvas = document.getElementById('demoPose2CanvasInner');

            if (anatomyContainer) {
                renderAnatomyImage(anatomyContainer, demo.primary, demo.secondary, demo.view);
            }
            if (pose1Canvas) drawPoseSilhouette(pose1Canvas, demo.startPose);
            if (pose2Canvas) drawPoseSilhouette(pose2Canvas, demo.endPose);

            // Render muscle legend below anatomy
            if (legendEl) {
                renderMuscleLegend(legendEl, demo.primary, demo.secondary);
            }
        }, 50);

        // Steps
        stepsEl.innerHTML = demo.steps.map(function(s, i) {
            return '<div class="demo-step-card"><div class="demo-step-num">' + (i + 1) + '</div><div class="demo-step-text">' + s + '</div></div>';
        }).join('');
    } else {
        tagsEl.innerHTML = '';
        videoAreaEl.innerHTML = '';
        figuresEl.innerHTML = '';
        contentGrid.style.display = 'none';
        if (legendEl) legendEl.innerHTML = '';
        stepsEl.innerHTML = '<div class="demo-coming">' +
            '<div style="font-size:40px;margin-bottom:12px;">&#128679;</div>' +
            '<div>동작 시연 준비 중입니다</div>' +
            '<div style="font-size:12px;margin-top:6px;color:var(--primary)">Coming Soon</div>' +
            '</div>';
    }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeDemoModal(event) {
    if (event && event.target !== event.currentTarget) return;
    // Cancel any running canvas animation
    if (_demoAnimationFrameId) {
        cancelAnimationFrame(_demoAnimationFrameId);
        _demoAnimationFrameId = null;
    }
    // Dispose all Three.js 3D instances
    _active3DInstances.forEach(function(inst) { if (inst && inst.dispose) inst.dispose(); });
    _active3DInstances = [];
    cleanup3DRenderers();

    const overlay = document.getElementById('demoOverlay');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    const videoArea = document.getElementById('demoVideoArea');
    if (videoArea) videoArea.innerHTML = '';
    const figuresArea = document.getElementById('demoFigures');
    if (figuresArea) figuresArea.innerHTML = '';
    const legendArea = document.getElementById('demoMuscleLegend');
    if (legendArea) legendArea.innerHTML = '';
}

// Close modal with Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDemoModal();
});

initApp();
renderDailyDashboard();
updateStreakCount();
startReminderCheck();
showTab('daily');

// ==================== Google Sign-In (Firebase Auth) ====================
function doGoogleLogin() {
    if (!window._firebaseSignIn) { alert('로그인 서비스가 아직 준비되지 않았습니다. 잠시 후 다시 시도해주세요.'); return; }
    window._firebaseSignIn().catch(function(err) {
        if (err && err.code === 'auth/popup-closed-by-user') return;
        alert('로그인 실패: ' + (err && err.message ? err.message : err));
    });
}
function doLogout() {
    if (!window._firebaseSignOut) return;
    window._firebaseSignOut().catch(function(err) { alert('로그아웃 실패: ' + err.message); });
}
function _updateAuthUI(user) {
    var loginBtn = document.getElementById('loginBtn');
    var userInfo = document.getElementById('userInfo');
    var avatar = document.getElementById('userAvatar');
    var name = document.getElementById('userName');
    if (!loginBtn || !userInfo) return;
    if (user) {
        loginBtn.style.display = 'none';
        userInfo.style.display = 'flex';
        if (avatar && user.photoURL) avatar.src = user.photoURL;
        if (name) name.textContent = user.displayName || user.email || '사용자';
    } else {
        loginBtn.style.display = '';
        userInfo.style.display = 'none';
    }
}
window._updateAuthUI = _updateAuthUI;
</script>
