<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' https://upload.wikimedia.org https://raw.githubusercontent.com https://*.googleusercontent.com https://lh3.googleusercontent.com data:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src https://workout-routine-359698.firebaseapp.com https://accounts.google.com https://apis.google.com;">
    <title>홈트레이닝 루틴 - 맞춤형 운동 프로그램</title>
    <style>
        /* Default: Sky-blue LIGHT theme */
        :root {
            --bg-main: #eaf4fc;
            --bg-secondary: #ffffff;
            --bg-card: #d8ecfb;
            --text-main: #0d3a5f;
            --text-muted: #4a7ca8;
            --primary: #2196f3;
            --primary-gradient: linear-gradient(90deg, #4fc3f7, #1e88e5);
            --border-color: #b8d6ee;
            --accent: #ef5350;
            --success: #26a69a;
            --badge-cardio-bg: #d4edf7; --badge-cardio-text: #0277bd;
            --badge-strength-bg: #fde3cf; --badge-strength-text: #c24a0e;
            --badge-core-bg: #e3dffc; --badge-core-text: #5637c8;
            --badge-plyo-bg: #fcdceb; --badge-plyo-text: #c22672;
            --badge-stretch-bg: #d0efe8; --badge-stretch-text: #00897b;
        }
        /* Dark navy variant (opt-in via theme toggle) */
        [data-theme="dark"] {
            --bg-main: #0a1929;
            --bg-secondary: #132f4c;
            --bg-card: #173a5e;
            --text-main: #e3f2fd;
            --text-muted: #7fa9c7;
            --primary: #4fc3f7;
            --primary-gradient: linear-gradient(90deg, #4fc3f7, #29b6f6);
            --border-color: #265b82;
            --accent: #ff6b6b;
            --success: #4dd0a8;
            --badge-cardio-bg: #0d3a5f; --badge-cardio-text: #7fc8ef;
            --badge-strength-bg: #3d1e0f; --badge-strength-text: #f4845f;
            --badge-core-bg: #1e1b4b; --badge-core-text: #a78bfa;
            --badge-plyo-bg: #4a1942; --badge-plyo-text: #e879a8;
            --badge-stretch-bg: #0f3d3e; --badge-stretch-text: #38d9a9;
        }
        /* Legacy alias — preserves any old localStorage value pointing at "light" (was the pure-white theme). */
        [data-theme="light"] { /* falls through to :root defaults (sky-blue light is now the default) */ }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); min-height: 100vh; }
        .header { background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card)); padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--border-color); }
        .header h1 { font-size: 28px; color: var(--primary); margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        .stats-bar { display: flex; justify-content: center; align-items: center; gap: 20px; padding: 15px; background: var(--bg-secondary); flex-wrap: wrap; }
        .reset-btn { min-height: 44px; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 10px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.25s; }
        .reset-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,0.08); }
        .reset-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        .goal-selector { display: flex; justify-content: center; gap: 8px; padding: 12px; background: var(--bg-main); flex-wrap: wrap; border-bottom: 1px solid var(--border-color); }
        .goal-btn { padding: 10px 18px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--bg-secondary); color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; }
        .goal-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(33,150,243,0.1); }
        .goal-btn:hover { border-color: var(--primary); }
        .goal-btn .goal-label { font-size: 11px; display: block; margin-top: 2px; color: var(--text-muted); }
        .goal-btn.active .goal-label { color: var(--primary); }
        .goal-btn.goal-bulk.active { border-color: #f4845f; color: #f4845f; background: rgba(244,132,95,0.1); }
        .goal-btn.goal-bulk.active .goal-label { color: #f4845f; }
        .goal-btn.goal-diet.active { border-color: #e879a8; color: #e879a8; background: rgba(232,121,168,0.1); }
        .goal-btn.goal-diet.active .goal-label { color: #e879a8; }
        .week-selector { display: flex; justify-content: center; gap: 8px; padding: 12px; background: var(--bg-main); flex-wrap: wrap; }
        .week-btn { padding: 10px 18px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--bg-secondary); color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; }
        .week-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(33,150,243,0.1); }
        .week-btn:hover { border-color: var(--primary); }
        .week-btn .week-label { font-size: 11px; display: block; margin-top: 2px; color: var(--text-muted); }
        .stat { text-align: center; padding: 10px 20px; background: var(--bg-card); border-radius: 10px; min-width: 100px; }
        .stat .num { font-size: 24px; font-weight: bold; color: var(--primary); }
        .stat .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .tabs { display: flex; overflow-x: auto; background: var(--bg-secondary); padding: 10px 10px 0; gap: 5px; }
        .tab { padding: 12px 20px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 600; border-radius: 10px 10px 0 0; white-space: nowrap; transition: all 0.3s; }
        .tab.active { background: var(--bg-main); color: var(--primary); }
        .tab:hover { color: var(--primary); }
        .tab-today { box-shadow: inset 0 -3px 0 var(--success); }
        .today-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--success); margin-left: 6px; vertical-align: middle; }
        .day-content { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .day-content.active { display: block; }
        .day-title { font-size: 22px; color: var(--primary); margin-bottom: 5px; }
        .day-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
        .section-label { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; padding-left: 5px; }
        .exercise-card { background: var(--bg-secondary); border-radius: 12px; padding: 16px; margin-bottom: 10px; border-left: 4px solid var(--border-color); transition: all 0.3s; cursor: pointer; }
        .exercise-card:hover { border-left-color: var(--primary); transform: translateX(4px); }
        .exercise-card.completed { border-left-color: var(--success); opacity: 0.7; }
        .exercise-card.completed .ex-name { text-decoration: line-through; }
        .ex-top { display: flex; justify-content: space-between; align-items: center; }
        .ex-name { font-size: 16px; font-weight: 600; color: var(--text-main); }
        .ex-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
        .badge-cardio { background: var(--badge-cardio-bg); color: var(--badge-cardio-text); }
        .badge-strength { background: var(--badge-strength-bg); color: var(--badge-strength-text); }
        .badge-core { background: var(--badge-core-bg); color: var(--badge-core-text); }
        .badge-plyo { background: var(--badge-plyo-bg); color: var(--badge-plyo-text); }
        .badge-stretch { background: var(--badge-stretch-bg); color: var(--badge-stretch-text); }
        .ex-detail { display: flex; gap: 15px; margin-top: 8px; color: var(--text-muted); font-size: 13px; flex-wrap: wrap; }
        .ex-detail span::before { margin-right: 4px; }
        .progress-bar { width: 100%; height: 6px; background: var(--bg-card); border-radius: 3px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-gradient); border-radius: 3px; transition: width 0.5s; width: 0%; }
        .week-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .week-day-card { background: var(--bg-secondary); border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .week-day-card:hover { border-color: var(--border-color); }
        .week-day-card .day-label { font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
        .week-day-card .day-name { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .week-day-card .day-focus { font-size: 12px; color: var(--primary); }
        .week-day-card.rest-day { background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary)); cursor: default; border-color: transparent;}
        .week-day-card.rest-day .day-name { color: var(--badge-stretch-text); }
        .check-icon { width: 22px; height: 22px; border: 2px solid var(--border-color); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
        .exercise-card.completed .check-icon { background: var(--success); border-color: var(--success); color: #fff; text-content: '\2713'; }
        .tip-box { background: var(--bg-card); border-radius: 10px; padding: 14px; margin-top: 15px; border-left: 3px solid #f4845f; }
        .tip-box .tip-title { font-size: 13px; font-weight: 700; color: #f4845f; margin-bottom: 5px; }
        .tip-box p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
        .timer-section { text-align: center; padding: 20px; margin: 20px 0; background: var(--bg-secondary); border-radius: 12px; }
        .timer-display { font-size: 48px; font-weight: 700; color: var(--primary); font-family: 'Courier New', monospace; margin: 10px 0; }
        .timer-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .timer-btn { padding: 10px 25px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-start { background: var(--primary); color: #fff; }
        .btn-stop { background: var(--accent); color: #fff; }
        .btn-reset { background: var(--bg-card); color: var(--text-muted); }
        .timer-btn:hover { transform: scale(1.05); }
        .timer-presets { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .preset-btn { padding: 6px 14px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; }
        .preset-btn:hover { border-color: var(--primary); color: var(--primary); }
        .shuffle-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: 2px solid var(--primary); border-radius: 10px; background: rgba(33,150,243,0.1); color: var(--primary); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; margin-bottom: 15px; }
        .shuffle-btn:hover { background: rgba(33,150,243,0.2); transform: scale(1.03); }
        .shuffle-btn:active { transform: scale(0.97); }

        /* 영단어 스타일 */
        .vocab-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .vocab-mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .vocab-mode-btn { padding: 10px 20px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--bg-secondary); color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; }
        .vocab-mode-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(33,150,243,0.1); }
        .vocab-mode-btn:hover { border-color: var(--primary); }
        .vocab-level-select { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .vocab-level-btn { padding: 6px 16px; border: 1px solid var(--border-color); border-radius: 20px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .vocab-level-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .flashcard { background: var(--bg-secondary); border-radius: 16px; padding: 40px 30px; text-align: center; min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; border: 2px solid var(--border-color); position: relative; }
        .flashcard:hover { border-color: var(--primary); transform: translateY(-2px); }
        .flashcard .word { font-size: 36px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
        .flashcard .phonetic { font-size: 16px; color: var(--text-muted); margin-bottom: 15px; }
        .flashcard .meaning { font-size: 20px; color: var(--primary); margin-bottom: 10px; }
        .flashcard .example { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 500px; }
        .flashcard .tap-hint { position: absolute; bottom: 15px; font-size: 12px; color: var(--text-muted); opacity: 0.5; }
        .flashcard .word-number { position: absolute; top: 15px; right: 20px; font-size: 13px; color: var(--text-muted); }
        .flashcard-nav { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .flashcard-nav button { padding: 12px 30px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .flashcard-nav .btn-prev { background: var(--bg-card); color: var(--text-muted); }
        .flashcard-nav .btn-next { background: var(--primary); color: #fff; }
        .flashcard-nav .btn-know { background: var(--success); color: #fff; }
        .flashcard-nav .btn-dont { background: var(--accent); color: #fff; }
        .flashcard-nav button:hover { transform: scale(1.05); }
        .vocab-stats { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .vocab-stat { background: var(--bg-card); padding: 12px 20px; border-radius: 10px; text-align: center; min-width: 90px; }
        .vocab-stat .vs-num { font-size: 22px; font-weight: 700; color: var(--primary); }
        .vocab-stat .vs-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .quiz-option { background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; font-size: 16px; color: var(--text-main); text-align: left; }
        .quiz-option:hover { border-color: var(--primary); transform: translateX(4px); }
        .quiz-option.correct { border-color: var(--success); background: rgba(0,230,118,0.1); }
        .quiz-option.wrong { border-color: var(--accent); background: rgba(233,69,96,0.1); }
        .quiz-result { text-align: center; padding: 40px 20px; }
        .quiz-result .score { font-size: 60px; font-weight: 700; color: var(--primary); }
        .vocab-word-list { display: grid; gap: 8px; }
        .vocab-word-item { background: var(--bg-secondary); border-radius: 10px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--border-color); transition: all 0.3s; }
        .vocab-word-item:hover { border-left-color: var(--primary); }
        .vocab-word-item.mastered { border-left-color: var(--success); opacity: 0.7; }
        .vocab-word-item .vw-word { font-size: 16px; font-weight: 600; color: var(--text-main); }
        .vocab-word-item .vw-mean { font-size: 14px; color: var(--text-muted); }
        .vocab-word-item .vw-status { font-size: 20px; }
        .speak-btn { background: rgba(33,150,243,0.15); border: 1px solid rgba(33,150,243,0.3); color: var(--primary); border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
        .speak-btn:hover { background: rgba(33,150,243,0.3); transform: scale(1.1); }
        .speak-btn.speaking { animation: pulse-speak 1s infinite; }
        .speak-btn-sm { width: 32px; height: 32px; font-size: 15px; }
        @keyframes pulse-speak { 0%,100% { box-shadow: 0 0 0 0 rgba(33,150,243,0.4); } 50% { box-shadow: 0 0 0 8px rgba(33,150,243,0); } }
        .speed-control { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 10px; }
        .speed-btn { padding: 4px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .speed-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .auto-play-bar { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 12px; padding: 10px; background: var(--bg-card); border-radius: 10px; }
        .auto-play-bar button { padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s; }

        /* 오늘의 체크 대시보드 */
        .daily-dashboard { max-width: 800px; margin: 0 auto; padding: 20px; }
        .today-banner { background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary)); border-radius: 16px; padding: 25px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .today-banner .today-date { font-size: 14px; color: var(--text-muted); margin-bottom: 5px; }
        .today-banner .today-greeting { font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .today-banner .today-status { font-size: 15px; padding: 6px 16px; border-radius: 20px; display: inline-block; font-weight: 600; }
        .today-banner .status-done { background: rgba(0,230,118,0.15); color: var(--success); }
        .today-banner .status-pending { background: rgba(233,69,96,0.15); color: var(--accent); animation: pulse-pending 2s infinite; }
        @keyframes pulse-pending { 0%,100%{ opacity:1; } 50%{ opacity:0.7; } }
        .check-card { background: var(--bg-secondary); border-radius: 16px; padding: 24px; margin-bottom: 15px; border: 2px solid var(--border-color); transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .check-card:hover { border-color: var(--primary); }
        .check-card.checked { border-color: var(--success); }
        .check-card.checked::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,230,118,0.03); pointer-events: none; }
        .check-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .check-card-icon { font-size: 32px; margin-right: 12px; }
        .check-card-title { font-size: 18px; font-weight: 700; color: var(--text-main); }
        .check-card-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .check-toggle { width: 56px; height: 30px; border-radius: 15px; background: var(--bg-card); border: none; cursor: pointer; position: relative; transition: all 0.3s; flex-shrink: 0; }
        .check-toggle.on { background: var(--success); }
        .check-toggle::after { content: ''; position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: all 0.3s; }
        .check-toggle.on::after { left: 29px; }
        .check-card-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
        .check-card-time { font-size: 12px; color: var(--primary); margin-top: 8px; }
        .streak-display { display: flex; gap: 6px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .streak-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; border: 2px solid var(--border-color); color: var(--text-muted); background: var(--bg-card); }
        .streak-dot.done { background: var(--success); border-color: var(--success); color: #fff; }
        .streak-dot.today { border-color: var(--primary); color: var(--primary); }
        .streak-dot.today.done { background: var(--success); border-color: var(--success); color: #fff; }
        .reminder-section { background: var(--bg-card); border-radius: 12px; padding: 18px; margin-top: 15px; border-left: 3px solid var(--primary); }
        .reminder-section .rem-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .reminder-toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .reminder-toggle-row:last-child { border-bottom: none; }
        .reminder-label { font-size: 14px; color: var(--text-main); }
        .reminder-sub { font-size: 12px; color: var(--text-muted); }
        .time-picker { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px 10px; color: var(--primary); font-size: 14px; font-family: 'Courier New', monospace; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .cal-header { text-align: center; font-size: 11px; color: var(--text-muted); padding: 4px; font-weight: 600; }
        .cal-day { text-align: center; padding: 6px 2px; font-size: 12px; border-radius: 6px; color: var(--text-muted); position: relative; }
        .cal-day.has-workout { color: var(--success); font-weight: 600; }
        .cal-day.has-vocab { border-bottom: 2px solid var(--primary); }
        .cal-day.has-both { background: rgba(0,230,118,0.1); color: var(--success); border-bottom: 2px solid var(--primary); }
        .cal-day.today { outline: 2px solid var(--primary); border-radius: 6px; }
        .cal-day.empty { color: transparent; }
        .noti-bar { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card)); padding: 14px 20px; display: flex; align-items: center; justify-content: center; gap: 15px; z-index: 1000; border-top: 2px solid var(--accent); transition: transform 0.5s; }
        .noti-bar.hidden { transform: translateY(100%); }

// ========== EXERCISE POOL SYSTEM ==========
// Each pool entry has alternatives. pickFromPool randomly selects one.
// The shuffleSeed changes on each shuffle to produce different selections.
let shuffleSeed = parseInt(localStorage.getItem('shuffleSeed') || String(Date.now()));

function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function pickFromPool(pool, slotIndex) {
    if (!pool || pool.length === 0) return null;
    let idx = Math.floor(seededRandom(shuffleSeed + slotIndex * 7 + 13) * pool.length);
    return pool[idx];
}

function shuffleExercises() {
    shuffleSeed = Date.now();
    localStorage.setItem('shuffleSeed', String(shuffleSeed));
    workoutData = generateWorkoutData(currentWeek);
    renderContent();
    loadState();
    // Stay on current tab
}

// ========== WORKOUT DATA GENERATION WITH GOAL + POOL ==========
function generateWorkoutData(week) {
    const w = week;
    const C = "cardio", S = "strength", CO = "core", P = "plyo", ST = "stretch";
    const b = (type, text) => [{ type, text }];
    const pools = getExercisePools();
    let slotCounter = 0;

    // Helper to pick exercise from pool and add details
    function ex(poolKey, name, details) {
        slotCounter++;
        if (poolKey && pools[poolKey]) {
            const picked = pickFromPool(pools[poolKey], slotCounter);
            if (picked) return { name: picked.name, badges: picked.badges, details: details };
        }
        // Fallback: use provided name/badge
        return { name: name, badges: [], details: details };
    }

    function exFixed(name, badges, details) {
        return { name, badges, details };
    }

    const goalLabel = goalInfo[currentGoal].name;
    const data = {
        title: "HOME FITNESS ROUTINE",
        subtitle: `4주 맞춤형 프로그램 | ${weekInfo[w].name} - ${weekInfo[w].theme} | ${goalInfo[currentGoal].icon} ${goalLabel}`,
        days: []
    };

    // ===== Goal-specific parameter adjustments =====
    let sets, restShort, restMed, restLong, hiitWork, hiitRest, rounds;
    if (currentGoal === 'bulk') {
        sets = w <= 2 ? 4 : 5;
        restShort = "60초";
        restMed = "75초";
        restLong = "90초";
        hiitWork = "30초 운동";
        hiitRest = "30초 휴식";
        rounds = w <= 2 ? 3 : 4;
    } else if (currentGoal === 'diet') {
        sets = 3;
        restShort = "20초";
        restMed = "25초";
        restLong = "30초";
        hiitWork = "45초 운동";
        hiitRest = "15초 휴식";
        rounds = w <= 2 ? 4 : 5;
    } else { // fitness
        sets = w <= 2 ? 3 : 4;
        restShort = "30초";
        restMed = "45초";
        restLong = "60초";
        hiitWork = "35초 운동";
        hiitRest = "25초 휴식";
        rounds = w <= 2 ? 3 : 4;
    }

    // ======== WEEK-SPECIFIC DATA ========
    if (w === 1) {

let workoutData = generateWorkoutData(currentWeek);

function initApp() {
    renderGoalSelector();
    renderWeekSelector();
    renderHeader();
    renderTabs();
    renderContent();
    loadState();
    document.getElementById('weekCount').textContent = currentWeek;
}

function renderGoalSelector() {
    const goals = [
        { key: 'fitness', css: '', label: '체력향상', sub: '균형 잡힌 체력' },
        { key: 'bulk',    css: 'goal-bulk', label: '벌크업', sub: '근력 & 근비대' },
        { key: 'diet',    css: 'goal-diet', label: '다이어트', sub: 'HIIT & 체지방' }
    ];
    let html = '';
    goals.forEach(g => {
        html += `<button class="goal-btn ${g.css} ${currentGoal === g.key ? 'active' : ''}" onclick="switchGoal('${g.key}')">
            ${goalInfo[g.key].icon} ${g.label}<span class="goal-label">${g.sub}</span>
        </button>`;
    });
    document.getElementById('goal-selector').innerHTML = html;
}

function switchGoal(goal) {
    currentGoal = goal;
    localStorage.setItem('currentGoal', goal);
    workoutData = generateWorkoutData(currentWeek);
    renderGoalSelector();
    renderHeader();
    renderTabs();
    renderContent();
    loadState();
    showTab('overview');
}

function renderWeekSelector() {
    let html = '';
    for (let i = 1; i <= 4; i++) {
        const info = weekInfo[i];
        html += `<button class="week-btn ${currentWeek === i ? 'active' : ''}" onclick="switchWeek(${i})">
            ${info.name}<span class="week-label">${info.theme}</span>
        </button>`;
    }
    document.getElementById('week-selector').innerHTML = html;
}

function switchWeek(w) {
    currentWeek = w;
    localStorage.setItem('currentWeek', w);
    workoutData = generateWorkoutData(w);
    document.getElementById('weekCount').textContent = w;
    renderWeekSelector();
    renderHeader();
    renderTabs();
    renderContent();
    loadState();
    showTab('overview');
}

function renderHeader() {
    const info = weekInfo[currentWeek];

const WEEKDAY_LABELS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
function renderTabs() {
    const todayLabel = WEEKDAY_LABELS[new Date().getDay()];
    let tabsHtml = `<button class="tab active" onclick="showTab('daily')" id="nav-daily">오늘의 체크</button>`;
    tabsHtml += `<button class="tab" onclick="showTab('overview')" id="nav-overview">주간 개요</button>`;
    workoutData.days.forEach(day => {
        if (!day.isRest) {
            const isToday = day.label === todayLabel;
            const cls = 'tab' + (isToday ? ' tab-today' : '');
            const marker = isToday ? ' <span class="today-dot" aria-label="오늘"></span>' : '';
            tabsHtml += `<button class="${cls}" onclick="showTab('${day.id}')" id="nav-${day.id}" ${isToday ? 'aria-current="date"' : ''}>${day.title}${marker}</button>`;
        }
    });
    tabsHtml += `<button class="tab" onclick="showTab('timer')" id="nav-timer">타이머</button>`;
    tabsHtml += `<button class="tab" onclick="showTab('vocab')" id="nav-vocab">영단어</button>`;

}

function showTab(tabId) {
    document.querySelectorAll('.day-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

    const target = document.getElementById('tab-' + tabId);
    if (target) target.classList.add('active');

    const nav = document.getElementById('nav-' + tabId);
    if (nav) nav.classList.add('active');
}

function toggleComplete(dayId, exIndex) {
    const card = document.getElementById(`${dayId}-ex-${exIndex}`);
    if (!card) return;

    card.classList.toggle('completed');
    const icon = card.querySelector('.check-icon:last-child');
    if (icon) {
        if(card.classList.contains('completed')){
            icon.textContent = '\u2713';
            icon.style.backgroundColor = 'var(--success)';
            icon.style.borderColor = 'var(--success)';
            icon.style.color = 'var(--bg-main)';
        } else {
            icon.textContent = '';
            icon.style.backgroundColor = 'transparent';
            icon.style.borderColor = '#333';
        }
    }

    updateProgress(dayId);
    saveState();
}

function updateProgress(dayId) {
    const container = document.getElementById('tab-' + dayId);
    if (!container) return;
    const cards = container.querySelectorAll('.exercise-card');
    const completed = container.querySelectorAll('.exercise-card.completed');
    const pct = cards.length > 0 ? (completed.length / cards.length * 100) : 0;
    const bar = document.getElementById('progress-' + dayId);
    if (bar) bar.style.width = pct + '%';

    updateTotalCompleted();
}

function updateTotalCompleted() {
    const allCompleted = document.querySelectorAll('.exercise-card.completed').length;
    document.getElementById('totalCompleted').textContent = allCompleted;
}

// v2: name-keyed per-exercise storage. Survives shuffle and order changes.
const STATE_STORAGE_KEY = 'workoutAllWeeks_v2';

const THEME_STORAGE_KEY = 'workoutTheme';
// Theme: default is sky-blue 'light'; 'dark' is the opt-in navy variant.
function applyTheme(theme) {
    if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.removeAttribute('data-theme');
    }
}
function toggleTheme() {
    const current = localStorage.getItem(THEME_STORAGE_KEY) || 'light';
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem(THEME_STORAGE_KEY, next);
    applyTheme(next);
}
applyTheme(localStorage.getItem(THEME_STORAGE_KEY) || 'light');

function resetAllChecks() {
    const ok = window.confirm('모든 주차·목표의 체크 기록을 초기화합니다. 계속할까요?');
    if (!ok) return;
    localStorage.removeItem(STATE_STORAGE_KEY);
    document.querySelectorAll('.exercise-card.completed').forEach(card => {
        card.classList.remove('completed');
        const icon = card.querySelector('.check-icon:last-child');
        if (icon) {
            icon.textContent = '';
            icon.style.backgroundColor = 'transparent';
            icon.style.borderColor = '#333';
            icon.style.color = '';
        }
    });
    document.querySelectorAll('.progress-fill').forEach(p => { p.style.width = '0%'; });
    updateTotalCompleted();
}
function saveState() {
    const allState = JSON.parse(localStorage.getItem(STATE_STORAGE_KEY) || '{}');
    const stateKey = 'week' + currentWeek + '_' + currentGoal;
    const state = {};
    workoutData.days.forEach(day => {
        if (day.isRest) return;
        const container = document.getElementById('tab-' + day.id);
        if (!container) return;
        const cards = container.querySelectorAll('.exercise-card');
        const dayMap = {};
        cards.forEach(c => {
            const name = c.getAttribute('data-ex-name');
            if (!name) return;
            dayMap[name] = c.classList.contains('completed');
        });
        state[day.id] = dayMap;
    });
    allState[stateKey] = state;
    localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(allState));
}

function loadState() {
    const allState = JSON.parse(localStorage.getItem(STATE_STORAGE_KEY) || '{}');
    const stateKey = 'week' + currentWeek + '_' + currentGoal;
    const state = allState[stateKey];
    if (!state) return;
    try {
        workoutData.days.forEach(day => {
            if (day.isRest) return;
            const container = document.getElementById('tab-' + day.id);
            const dayMap = state[day.id];
            if (!container || !dayMap) return;
            const cards = container.querySelectorAll('.exercise-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-ex-name');
                if (!name || !dayMap[name]) return;
                card.classList.add('completed');
                const icon = card.querySelector('.check-icon:last-child');
                if (icon) {
                    icon.textContent = '\u2713';
                    icon.style.backgroundColor = 'var(--success)';
                    icon.style.borderColor = 'var(--success)';
                    icon.style.color = 'var(--bg-main)';
                }
            });
            updateProgress(day.id);
        });
    } catch(e) { console.error("상태를 불러오는데 실패했습니다.", e); }
}

// Timer Logic
let timerInterval = null, timerSeconds = 0, timerCountingDown = false;
function setTimer(seconds) { stopTimer(); timerSeconds = seconds; timerCountingDown = true; updateTimerDisplay(); }
function updateTimerDisplay() {
    const min = Math.floor(timerSeconds / 60); const sec = timerSeconds % 60;
    document.getElementById('timerDisplay').textContent = String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
        if (timerCountingDown && timerSeconds <= 0) {
            stopTimer(); playBeep();
            document.getElementById('timerLabel').textContent = '완료!'; return;
        }
        timerCountingDown ? timerSeconds-- : timerSeconds++;
        updateTimerDisplay();
    }, 1000);
    document.getElementById('timerLabel').textContent = timerCountingDown ? '카운트다운' : '스톱워치';
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }
function resetTimer() { stopTimer(); timerSeconds = 0; timerCountingDown = false; updateTimerDisplay(); document.getElementById('timerLabel').textContent = '타이머'; }

// Tabata Logic
let tabataInterval = null, tabataRound = 0, tabataTime = 20, tabataIsWork = true;
function startTabata() {
    if (tabataInterval) return;
    tabataRound = 1; tabataTime = 20; tabataIsWork = true; updateTabataDisplay();
    document.getElementById('tabataStatus').textContent = '운동!';
    document.getElementById('tabataStatus').style.color = 'var(--accent)';

    tabataInterval = setInterval(() => {
        tabataTime--;
        if (tabataTime <= 0) {
            if (tabataIsWork) {
                if (tabataRound >= 8) {
                    clearInterval(tabataInterval); tabataInterval = null;
                    document.getElementById('tabataStatus').textContent = '완료!';
                    document.getElementById('tabataStatus').style.color = 'var(--success)';
                    playBeep(); return;
                }
                tabataIsWork = false; tabataTime = 10;
                document.getElementById('tabataStatus').textContent = '휴식';
                document.getElementById('tabataStatus').style.color = 'var(--primary)';
            } else {
                tabataIsWork = true; tabataRound++; tabataTime = 20;
                document.getElementById('tabataStatus').textContent = '운동!';
                document.getElementById('tabataStatus').style.color = 'var(--accent)';
            }
            playBeep();
        }
        updateTabataDisplay();
    }, 1000);
}
function resetTabata() {
    clearInterval(tabataInterval); tabataInterval = null; tabataRound = 0; tabataTime = 20; tabataIsWork = true;
    document.getElementById('tabataDisplay').textContent = '00:20';
    document.getElementById('tabataStatus').textContent = '준비';

}
function updateTabataDisplay() {

    document.getElementById('tabataRound').textContent = '라운드 ' + tabataRound + '/8';

function playBeep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; gain.gain.value = 0.3;
        osc.start(); setTimeout(() => { osc.stop(); ctx.close(); }, 200);
    } catch(e) {}
}

// ========== 영단어 학습 앱 ==========
let vocabState = {
    level: '일상생활',
    mode: 'flashcard',
    cardIndex: 0,
    showMeaning: false,
    mastered: JSON.parse(localStorage.getItem('vocabMastered') || '{}'),
    quizWords: [],
    quizIndex: 0,
    quizScore: 0,
    quizAnswered: false,
    quizDone: false,
    speechRate: 0.8,
    autoPlaying: false,
    autoPlayTimer: null
};

function speakWord(text, rate) {
    if (!window.speechSynthesis) { alert('이 브라우저에서는 음성 기능을 지원하지 않습니다.'); return; }
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = rate || vocabState.speechRate;
    utter.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female'))
        || voices.find(v => v.lang.startsWith('en-US'))
        || voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utter.voice = enVoice;
    const btns = document.querySelectorAll('.speak-btn');
    btns.forEach(b => b.classList.add('speaking'));
    utter.onend = () => btns.forEach(b => b.classList.remove('speaking'));
    utter.onerror = () => btns.forEach(b => b.classList.remove('speaking'));
    window.speechSynthesis.speak(utter);
}

function speakWordAndExample(word, example) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female'))
        || voices.find(v => v.lang.startsWith('en-US'))
        || voices.find(v => v.lang.startsWith('en'));
    const u1 = new SpeechSynthesisUtterance(word);
    u1.lang = 'en-US'; u1.rate = vocabState.speechRate; if (enVoice) u1.voice = enVoice;
    const btns = document.querySelectorAll('.speak-btn');
    btns.forEach(b => b.classList.add('speaking'));
    u1.onend = () => {
        setTimeout(() => {
            const u2 = new SpeechSynthesisUtterance(example);
            u2.lang = 'en-US'; u2.rate = vocabState.speechRate; if (enVoice) u2.voice = enVoice;
            u2.onend = () => btns.forEach(b => b.classList.remove('speaking'));
            u2.onerror = () => btns.forEach(b => b.classList.remove('speaking'));
            window.speechSynthesis.speak(u2);
        }, 400);
    };
    window.speechSynthesis.speak(u1);
}

function setSpeedRate(rate) { vocabState.speechRate = rate; renderVocabApp(); }

function startAutoPlay() {
    if (vocabState.autoPlaying) { stopAutoPlay(); return; }
    vocabState.autoPlaying = true;
    vocabState.showMeaning = true;
    renderVocabApp();
    playCurrentAndAdvance();
}

function playCurrentAndAdvance() {
    if (!vocabState.autoPlaying) return;
    const words = getVocabWords();
    const w = words[vocabState.cardIndex];
    speakWordAndExample(w.word, w.example);
    const waitTime = (w.word.length * 200 + w.example.split(' ').length * 400 + 2500);
    vocabState.autoPlayTimer = setTimeout(() => {
        if (!vocabState.autoPlaying) return;
        vocabState.cardIndex = (vocabState.cardIndex + 1) % words.length;
        vocabState.showMeaning = true;
        renderVocabApp();
        playCurrentAndAdvance();
    }, waitTime);
}

function stopAutoPlay() {
    vocabState.autoPlaying = false;
    window.speechSynthesis.cancel();
    clearTimeout(vocabState.autoPlayTimer);
    renderVocabApp();
}

if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function saveVocabState() { localStorage.setItem('vocabMastered', JSON.stringify(vocabState.mastered)); }
function getVocabWords() { return vocabDatabase[vocabState.level] || []; }
function getMasteredCount(level) {
    const key = level || vocabState.level;
    return Object.keys(vocabState.mastered).filter(k => k.startsWith(key + ':') && vocabState.mastered[k]).length;
}

function renderVocabApp() {

    let html = `
        <div class="day-title">영단어 학습</div>
        <div class="day-subtitle">플래시카드 & 퀴즈로 영단어를 암기하세요</div>

            <div class="vocab-stat"><div class="vs-num">${masteredCount}</div><div class="vs-label">암기 완료</div></div>
            <div class="vocab-stat"><div class="vs-num">${words.length - masteredCount}</div><div class="vs-label">남은 단어</div></div>
            <div class="vocab-stat"><div class="vs-num">${words.length > 0 ? Math.round(masteredCount / words.length * 100) : 0}%</div><div class="vs-label">진행률</div></div>

function renderFlashcard(words) {
    if (words.length === 0) return '<p style="color:var(--text-muted);text-align:center;">단어가 없습니다.</p>';
    if (vocabState.cardIndex >= words.length) vocabState.cardIndex = 0;
    const w = words[vocabState.cardIndex];
    const key = vocabState.level + ':' + w.word;
    const isMastered = vocabState.mastered[key];
    const escapedWord = w.word.replace(/'/g, "\\'");
    const escapedExample = w.example.replace(/'/g, "\\'");
    let cardContent = '';
    if (vocabState.showMeaning) {
        cardContent = `
            <div class="word">${w.word} <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${escapedWord}')" title="단어 발음 듣기">&#x1F50A;</button></div>
            <div class="phonetic">${w.phonetic}</div>
            <div class="meaning">${w.meaning}</div>
            <div class="example" style="cursor:pointer;" onclick="event.stopPropagation(); speakWord('${escapedExample}')" title="예문 듣기">"${w.example}" &#x1F508;</div>
        `;
    } else {
        cardContent = `
            <div class="word">${w.word} <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${escapedWord}')" title="단어 발음 듣기">&#x1F50A;</button></div>
            <div class="phonetic">${w.phonetic}</div>
            <div style="font-size:16px; color:var(--text-muted); margin-top:20px;">뜻을 떠올려 보세요...</div>
        `;
    }
    return `
        <div class="flashcard" onclick="flipCard()">
            <div class="word-number">${vocabState.cardIndex + 1} / ${words.length} ${isMastered ? '&#x2705;' : ''}</div>
            ${cardContent}
            <div class="tap-hint">${vocabState.showMeaning ? '탭하여 닫기' : '탭하여 뜻 보기'}</div>
        </div>
        <div class="flashcard-nav">
            <button class="btn-prev" onclick="prevCard()">&#x25C0; 이전</button>
            <button class="speak-btn" onclick="speakWordAndExample('${escapedWord}', '${escapedExample}')" title="단어+예문 듣기" style="border-radius:10px; width:auto; padding:12px 20px;">&#x1F50A; 단어+예문</button>
            <button class="${isMastered ? 'btn-dont' : 'btn-know'}" onclick="toggleMastered('${key}')">${isMastered ? '다시 학습' : '&#x2713; 암기 완료'}</button>
            <button class="btn-next" onclick="nextCard()">다음 &#x25B6;</button>
        </div>
        <div class="speed-control">
            <span style="font-size:12px; color:var(--text-muted);">속도:</span>
            ${[{r:0.5,l:'느리게'},{r:0.8,l:'보통'},{r:1.0,l:'빠르게'}].map(s => `<button class="speed-btn ${vocabState.speechRate===s.r?'active':''}" onclick="setSpeedRate(${s.r})">${s.l}</button>`).join('')}
        </div>
        <div class="auto-play-bar">
            <button style="background:${vocabState.autoPlaying ? 'var(--accent)' : 'var(--primary)'}; color:${vocabState.autoPlaying ? '#fff' : 'var(--bg-main)'};" onclick="${vocabState.autoPlaying ? 'stopAutoPlay()' : 'startAutoPlay()'}">
                ${vocabState.autoPlaying ? '&#x23F9; 자동재생 중지' : '&#x25B6; 자동재생 (듣기모드)'}
            </button>
            <span style="font-size:12px; color:var(--text-muted);">단어+예문을 순서대로 읽어줍니다</span>
        </div>
        <div style="text-align:center; margin-top:15px;">
            <button class="preset-btn" onclick="shuffleVocabCards()" style="font-size:13px;">&#x1F500; 섞기</button>
            <button class="preset-btn" onclick="showUnmastered()" style="font-size:13px;">&#x1F4DD; 모르는 단어만</button>
            <button class="preset-btn" onclick="resetMastered()" style="font-size:13px;">&#x21A9; 초기화</button>
        </div>
    `;
}

function renderQuiz(words) {
    if (words.length < 4) return '<p style="color:var(--text-muted);text-align:center;">퀴즈를 진행하려면 최소 4개 단어가 필요합니다.</p>';
    if (vocabState.quizWords.length === 0 || vocabState.quizDone) {
        return `
            <div style="text-align:center; padding:40px 20px;">
                ${vocabState.quizDone ? `
                    <div class="quiz-result">
                        <div style="font-size:18px; color:var(--text-muted); margin-bottom:10px;">퀴즈 결과</div>
                        <div class="score">${vocabState.quizScore} / ${vocabState.quizWords.length}</div>
                        <div style="font-size:16px; color:${vocabState.quizScore >= vocabState.quizWords.length * 0.8 ? 'var(--success)' : vocabState.quizScore >= vocabState.quizWords.length * 0.5 ? 'var(--primary)' : 'var(--accent)'}; margin-top:10px;">
                            ${vocabState.quizScore >= vocabState.quizWords.length * 0.8 ? '훌륭합니다!' : vocabState.quizScore >= vocabState.quizWords.length * 0.5 ? '좋아요! 조금 더 연습해보세요' : '다시 복습해보세요'}
                        </div>
                    </div>
                ` : `
                    <div style="font-size:18px; color:var(--text-main); margin-bottom:10px;">영단어 퀴즈</div>
                    <div style="color:var(--text-muted); margin-bottom:20px;">영어 단어를 보고 올바른 뜻을 고르세요</div>
                `}
                <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
                    <button class="timer-btn btn-start" onclick="startQuiz(10)">10문제</button>
                    <button class="timer-btn btn-start" onclick="startQuiz(${Math.min(words.length, 15)})">전체 (${Math.min(words.length, 15)})</button>
                </div>
            </div>
        `;
    }
    const qi = vocabState.quizIndex;
    if (qi >= vocabState.quizWords.length) { vocabState.quizDone = true; return renderQuiz(words); }
    const q = vocabState.quizWords[qi];
    return `
        <div style="text-align:center; margin-bottom:15px;">
            <span style="color:var(--text-muted);">문제 ${qi + 1} / ${vocabState.quizWords.length}</span>
            <span style="color:var(--success); margin-left:15px;">정답: ${vocabState.quizScore}</span>
        </div>
        <div class="flashcard" style="cursor:default; min-height:120px; margin-bottom:20px;">
            <div class="word">${q.word} <button class="speak-btn" onclick="speakWord('${q.word.replace(/'/g, "\\'")}')" title="발음 듣기">&#x1F50A;</button></div>
            <div class="phonetic">${q.phonetic}</div>
        </div>
        <div id="quizOptions">
            ${q.options.map((opt, i) => `
                <div class="quiz-option" id="qopt-${i}" onclick="answerQuiz(${i}, ${q.correctIndex})">${opt}</div>
            `).join('')}
        </div>
        ${vocabState.quizAnswered ? `
            <div style="text-align:center; margin-top:15px;">
                <button class="timer-btn btn-start" onclick="nextQuizQuestion()">다음 문제 &#x25B6;</button>
            </div>
        ` : ''}
    `;
}

function renderWordList(words) {
    if (words.length === 0) return '<p style="color:var(--text-muted);text-align:center;">단어가 없습니다.</p>';
    return `
        <div class="vocab-word-list">
            ${words.map((w, i) => {
                const key = vocabState.level + ':' + w.word;
                const isMastered = vocabState.mastered[key];
                return `
                    <div class="vocab-word-item ${isMastered ? 'mastered' : ''}">
                        <div style="flex:1; cursor:pointer;" onclick="toggleMastered('${key}')">
                            <div class="vw-word">${w.word} <span style="font-size:12px;color:var(--text-muted);">${w.phonetic}</span></div>
                            <div class="vw-mean">${w.meaning}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <button class="speak-btn speak-btn-sm" onclick="speakWord('${w.word.replace(/'/g, "\\'")}')" title="발음 듣기">&#x1F50A;</button>
                            <div class="vw-status" style="cursor:pointer;" onclick="toggleMastered('${key}')">${isMastered ? '&#x2705;' : '&#x2B1C;'}</div>
                        </div>
                    </div>
                `;
            }).join('')}
        </div>
    `;
}

function setVocabLevel(level) { vocabState.level = level; vocabState.cardIndex = 0; vocabState.showMeaning = false; vocabState.quizWords = []; vocabState.quizDone = false; renderVocabApp(); }
function setVocabMode(mode) { vocabState.mode = mode; vocabState.showMeaning = false; vocabState.quizWords = []; vocabState.quizDone = false; renderVocabApp(); }
function flipCard() { vocabState.showMeaning = !vocabState.showMeaning; renderVocabApp(); }
function prevCard() { const words = getVocabWords(); vocabState.cardIndex = (vocabState.cardIndex - 1 + words.length) % words.length; vocabState.showMeaning = false; renderVocabApp(); }
function nextCard() { const words = getVocabWords(); vocabState.cardIndex = (vocabState.cardIndex + 1) % words.length; vocabState.showMeaning = false; renderVocabApp(); }
function toggleMastered(key) { vocabState.mastered[key] = !vocabState.mastered[key]; saveVocabState(); renderVocabApp(); }
function shuffleVocabCards() { vocabState.cardIndex = Math.floor(Math.random() * getVocabWords().length); vocabState.showMeaning = false; renderVocabApp(); }
function showUnmastered() { const words = getVocabWords(); const idx = words.findIndex((w, i) => !vocabState.mastered[vocabState.level + ':' + w.word]); if (idx >= 0) { vocabState.cardIndex = idx; vocabState.showMeaning = false; renderVocabApp(); } }
function resetMastered() { const words = getVocabWords(); words.forEach(w => { delete vocabState.mastered[vocabState.level + ':' + w.word]; }); saveVocabState(); vocabState.cardIndex = 0; vocabState.showMeaning = false; renderVocabApp(); }

function startQuiz(count) {
    const words = getVocabWords();
    const shuffled = [...words].sort(() => Math.random() - 0.5).slice(0, count);
    vocabState.quizWords = shuffled.map(w => {
        const wrongOptions = words.filter(o => o.word !== w.word).sort(() => Math.random() - 0.5).slice(0, 3).map(o => o.meaning);
        const options = [...wrongOptions, w.meaning].sort(() => Math.random() - 0.5);
        return { ...w, options, correctIndex: options.indexOf(w.meaning) };
    });
    vocabState.quizIndex = 0; vocabState.quizScore = 0; vocabState.quizAnswered = false; vocabState.quizDone = false;
    renderVocabApp();
}

function answerQuiz(selected, correct) {
    if (vocabState.quizAnswered) return;
    vocabState.quizAnswered = true;
    const opts = document.querySelectorAll('.quiz-option');
    opts[correct].classList.add('correct');
    if (selected !== correct) { opts[selected].classList.add('wrong'); }
    else { vocabState.quizScore++; const w = vocabState.quizWords[vocabState.quizIndex]; vocabState.mastered[vocabState.level + ':' + w.word] = true; saveVocabState(); }
    setTimeout(() => renderVocabApp(), 100);
}

function nextQuizQuestion() { vocabState.quizIndex++; vocabState.quizAnswered = false; renderVocabApp(); }

// ========== 오늘의 체크 & 리마인더 ==========
function getTodayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getDailyLog() { return JSON.parse(localStorage.getItem('dailyCheckLog') || '{}'); }
function saveDailyLog(log) { localStorage.setItem('dailyCheckLog', JSON.stringify(log)); }
function getTodayCheck() { const log = getDailyLog(); const today = getTodayKey(); return log[today] || { workout: false, vocab: false, workoutTime: null, vocabTime: null }; }

function toggleDailyCheck(type) {
    const log = getDailyLog();
    const today = getTodayKey();
    if (!log[today]) log[today] = { workout: false, vocab: false, workoutTime: null, vocabTime: null };
    log[today][type] = !log[today][type];
    if (log[today][type]) { log[today][type + 'Time'] = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); }
    else { log[today][type + 'Time'] = null; }
    saveDailyLog(log);
    renderDailyDashboard();
    updateStreakCount();
    checkNotiBar();
}

function getStreak() {
    const log = getDailyLog();
    let streak = 0;
    const d = new Date();
    const todayCheck = getTodayCheck();
    if (!todayCheck.workout || !todayCheck.vocab) { d.setDate(d.getDate() - 1); }
    while (true) {
        const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        const entry = log[key];
        if (entry && entry.workout && entry.vocab) { streak++; d.setDate(d.getDate() - 1); }
        else { break; }
    }
    if (todayCheck.workout && todayCheck.vocab) streak++;
    return streak;
}

function updateStreakCount() { const el = document.getElementById('streakCount'); if (el) el.textContent = getStreak(); }

function getRecentDays(count) {
    const days = [];
    const d = new Date();
    const log = getDailyLog();
    for (let i = count - 1; i >= 0; i--) {
        const dd = new Date(d); dd.setDate(dd.getDate() - i);
        const key = dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0') + '-' + String(dd.getDate()).padStart(2,'0');
        const entry = log[key] || { workout: false, vocab: false };
        const dayNames = ['일','월','화','수','목','금','토'];
        days.push({ date: dd.getDate(), day: dayNames[dd.getDay()], key: key, isToday: i === 0, ...entry });
    }
    return days;
}

function getMonthCalendar() {
    const now = new Date();
    const year = now.getFullYear(); const month = now.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();
    const log = getDailyLog();
    const today = now.getDate();
    const days = [];
    for (let i = 0; i < firstDay; i++) days.push(null);
    for (let d = 1; d <= lastDate; d++) {
        const key = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        const entry = log[key] || { workout: false, vocab: false };
        days.push({ date: d, isToday: d === today, workout: entry.workout, vocab: entry.vocab });
    }
    return { year, month, days };
}

function getReminderSettings() { return JSON.parse(localStorage.getItem('reminderSettings') || '{"enabled":true,"workoutTime":"09:00","vocabTime":"21:00","interval":60}'); }
function saveReminderSettings(s) { localStorage.setItem('reminderSettings', JSON.stringify(s)); }

function renderDailyDashboard() {
    const container = document.getElementById('dailyDashboard');
    if (!container) return;
    const check = getTodayCheck();
    const streak = getStreak();
    const recent = getRecentDays(14);
    const cal = getMonthCalendar();
    const reminder = getReminderSettings();
    const now = new Date();
    const hour = now.getHours();
    let greeting = '좋은 아침이에요!';
    if (hour >= 12 && hour < 18) greeting = '좋은 오후예요!';
    else if (hour >= 18) greeting = '좋은 저녁이에요!';
    const allDone = check.workout && check.vocab;
    const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const log = getDailyLog();
    let monthWorkout = 0, monthVocab = 0, monthBoth = 0;

function toggleReminder() { const s = getReminderSettings(); s.enabled = !s.enabled; saveReminderSettings(s); renderDailyDashboard(); if (s.enabled) startReminderCheck(); }
function updateReminderTime(field, value) { const s = getReminderSettings(); s[field] = value; saveReminderSettings(s); }
function updateReminderInterval(minutes) { const s = getReminderSettings(); s.interval = minutes; saveReminderSettings(s); renderDailyDashboard(); startReminderCheck(); }

function requestNotificationPermission() {
    if (!('Notification' in window)) { alert('이 브라우저는 알림을 지원하지 않습니다.'); return; }
    Notification.requestPermission().then(perm => {
        updateNotiPermStatus();
        if (perm === 'granted') { new Notification('알림 설정 완료!', { body: '운동/영단어 리마인더가 활성화되었습니다.' }); }
    });
}

function updateNotiPermStatus() {
    const el = document.getElementById('notiPermStatus');
    if (!el) return;
    if (!('Notification' in window)) { el.textContent = '이 브라우저는 푸시 알림을 지원하지 않습니다'; }
    else if (Notification.permission === 'granted') { el.innerHTML = '<span style="color:var(--success);">&#x2713; 푸시 알림이 허용되었습니다</span>'; }
    else if (Notification.permission === 'denied') { el.innerHTML = '<span style="color:var(--accent);">&#x2717; 알림이 차단되었습니다. 브라우저 설정에서 변경하세요.</span>'; }
    else { el.textContent = '아직 알림이 허용되지 않았습니다'; }
}

let reminderInterval = null;
let notiDismissedUntil = 0;

function checkNotiBar() {
    const check = getTodayCheck();
    const reminder = getReminderSettings();
    if (!reminder.enabled) { hideNotiBar(); return; }
    if (check.workout && check.vocab) { hideNotiBar(); return; }
    if (Date.now() < notiDismissedUntil) return;
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const [wh, wm] = reminder.workoutTime.split(':').map(Number);
    const [vh, vm] = reminder.vocabTime.split(':').map(Number);
    const pending = [];
    if (!check.workout && nowMin >= wh * 60 + wm) pending.push('운동');
    if (!check.vocab && nowMin >= vh * 60 + vm) pending.push('영단어');
    if (pending.length > 0) { showNotiBar(pending); sendPushNotification(pending); }
    else { hideNotiBar(); }
}

function showNotiBar(pending) {
    const bar = document.getElementById('notiBar');
    const text = document.getElementById('notiText');
    if (!bar) return;
    text.textContent = '오늘 ' + pending.join(', ') + '을(를) 아직 안 했어요!';
    bar.classList.remove('hidden');
}
function hideNotiBar() { const bar = document.getElementById('notiBar'); if (bar) bar.classList.add('hidden'); }
function dismissNoti() { const reminder = getReminderSettings(); notiDismissedUntil = Date.now() + reminder.interval * 60 * 1000; hideNotiBar(); }
function goToUndone() { const check = getTodayCheck(); hideNotiBar(); if (!check.workout) { showTab('overview'); } else if (!check.vocab) { showTab('vocab'); } }

let lastPushTime = 0;
function sendPushNotification(pending) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    if (Date.now() - lastPushTime < 300000) return;
    lastPushTime = Date.now();
    new Notification('오늘 할 일이 남아있어요!', { body: pending.join(', ') + '을(를) 아직 완료하지 않았습니다. 지금 시작해보세요!', requireInteraction: true });
}

function startReminderCheck() {
    if (reminderInterval) clearInterval(reminderInterval);
    const reminder = getReminderSettings();
    if (!reminder.enabled) return;
    checkNotiBar();
    reminderInterval = setInterval(checkNotiBar, reminder.interval * 60 * 1000);
}

// ==================== SHARED: Muscular limb creation with varying radius ====================
function createMuscularLimb(pathPoints, radiusFunc, segments, radialSegments) {
    segments = segments || 24;
    radialSegments = radialSegments || 12;
    var curve = new THREE.CatmullRomCurve3(pathPoints);
    var vertices = [];
    var normals = [];
    var uvs = [];
    var indices = [];

    for (var i = 0; i <= segments; i++) {
        var t = i / segments;
        var point = curve.getPointAt(t);
        var tangent = curve.getTangentAt(t).normalize();
        var radius = radiusFunc(t);

        // Build a local frame
        var up = Math.abs(tangent.y) > 0.99 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
        var binormal = new THREE.Vector3().crossVectors(tangent, up).normalize();
        var normal = new THREE.Vector3().crossVectors(binormal, tangent).normalize();

        for (var j = 0; j <= radialSegments; j++) {
            var angle = (j / radialSegments) * Math.PI * 2;
            var cos = Math.cos(angle);
            var sin = Math.sin(angle);

            var vx = point.x + radius * (cos * normal.x + sin * binormal.x);
            var vy = point.y + radius * (cos * normal.y + sin * binormal.y);
            var vz = point.z + radius * (cos * normal.z + sin * binormal.z);
            vertices.push(vx, vy, vz);

            var nx = cos * normal.x + sin * binormal.x;
            var ny = cos * normal.y + sin * binormal.y;
            var nz = cos * normal.z + sin * binormal.z;
            normals.push(nx, ny, nz);

            uvs.push(j / radialSegments, t);
        }
    }

    for (var i = 0; i < segments; i++) {
        for (var j = 0; j < radialSegments; j++) {
            var a = i * (radialSegments + 1) + j;
            var b = a + radialSegments + 1;
            var c = a + 1;
            var d = b + 1;
            indices.push(a, b, c);
            indices.push(c, b, d);
        }
    }

    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeVertexNormals();
    return geo;
}

// Helper: create organic torso using LatheGeometry with detailed body profile
function createOrganicTorso(height, profilePoints, segments) {
    segments = segments || 24;
    var pts = [];
    for (var i = 0; i < profilePoints.length; i++) {
        pts.push(new THREE.Vector2(profilePoints[i].r, profilePoints[i].y * height));
    }
    return new THREE.LatheGeometry(pts, segments);
}
