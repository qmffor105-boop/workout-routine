steps:
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/workout-routine:$SHORT_SHA
      - -t
      - asia-northeast3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/workout-routine:latest
      - .

  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-northeast3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/workout-routine

  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - workout-routine
      - --image=asia-northeast3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/workout-routine:$SHORT_SHA
      - --region=asia-northeast3
      - --platform=managed
      - --allow-unauthenticated
      - --quiet

images:
  - asia-northeast3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/workout-routine:$SHORT_SHA
  - asia-northeast3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/workout-routine:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
